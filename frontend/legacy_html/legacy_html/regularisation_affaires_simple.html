<!DOCTYPE html>
<html lang="fr">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>RaLab4 - Correction simple des affaires</title>
	<style>
		:root {
			--nge-blue: #002c77;
			--nge-yellow: #f6be00;
			--bg: #f4f6fa;
			--card: #ffffff;
			--text: #1f2937;
			--muted: #6b7280;
			--line: #d7dce5;
			--ok: #0f766e;
			--warn: #b45309;
		}
		* { box-sizing: border-box; }
		html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: "Segoe UI", Arial, sans-serif; }
		body { min-height: 100vh; overflow-y: auto; }
		.page {
			max-width: 1800px;
			margin: 0 auto;
			padding: 20px;
		}
		.header {
			background: var(--card);
			border: 1px solid var(--line);
			border-radius: 16px;
			padding: 18px 20px;
			margin-bottom: 16px;
			box-shadow: 0 6px 18px rgba(0, 44, 119, 0.06);
		}
		h1 {
			margin: 0 0 6px 0;
			color: var(--nge-blue);
			font-size: 24px;
		}
		.subtitle {
			margin: 0;
			color: var(--muted);
		}
		.controls {
			display: grid;
			grid-template-columns: 1.4fr auto auto auto;
			gap: 12px;
			align-items: center;
			background: var(--card);
			border: 1px solid var(--line);
			border-radius: 16px;
			padding: 14px;
			margin-bottom: 16px;
			position: sticky;
			top: 0;
			z-index: 10;
		}
		.controls input[type="text"] {
			width: 100%;
			padding: 10px 12px;
			border: 1px solid var(--line);
			border-radius: 10px;
			font-size: 14px;
		}
		.controls label {
			display: inline-flex;
			align-items: center;
			gap: 8px;
			white-space: nowrap;
			color: var(--muted);
			font-size: 14px;
		}
		button {
			border: 0;
			border-radius: 10px;
			padding: 10px 14px;
			font-size: 14px;
			font-weight: 600;
			cursor: pointer;
		}
		.btn-primary { background: var(--nge-blue); color: #fff; }
		.btn-secondary { background: #e9eef8; color: var(--nge-blue); }
		.btn-save { background: var(--nge-yellow); color: #1f2937; }
		.summary {
			display: grid;
			grid-template-columns: repeat(3, minmax(180px, 1fr));
			gap: 12px;
			margin-bottom: 16px;
		}
		.card {
			background: var(--card);
			border: 1px solid var(--line);
			border-radius: 14px;
			padding: 14px 16px;
		}
		.card .label { color: var(--muted); font-size: 13px; margin-bottom: 6px; }
		.card .value { color: var(--nge-blue); font-size: 28px; font-weight: 700; }
		.table-wrap {
			background: var(--card);
			border: 1px solid var(--line);
			border-radius: 16px;
			box-shadow: 0 6px 18px rgba(0, 44, 119, 0.06);
			overflow: hidden;
		}
		.table-scroll {
			overflow-x: auto;
			overflow-y: auto;
			max-height: calc(100vh - 270px);
		}
		table {
			width: 100%;
			min-width: 1600px;
			border-collapse: collapse;
		}
		thead th {
			position: sticky;
			top: 0;
			background: #eef3fb;
			color: var(--nge-blue);
			padding: 12px 10px;
			border-bottom: 1px solid var(--line);
			text-align: left;
			font-size: 13px;
			z-index: 5;
		}
		tbody td {
			padding: 10px;
			border-bottom: 1px solid #edf1f7;
			vertical-align: top;
			font-size: 13px;
		}
		tbody tr:hover { background: #fafcff; }
		.current-block {
			display: grid;
			gap: 6px;
			min-width: 250px;
		}
		.current-block div { line-height: 1.35; }
		.muted { color: var(--muted); }
		.pill {
			display: inline-block;
			padding: 4px 8px;
			border-radius: 999px;
			font-size: 12px;
			font-weight: 700;
		}
		.pill-problem { background: #fff7ed; color: var(--warn); }
		.pill-ok { background: #ecfdf5; color: var(--ok); }
		.edit-grid {
			display: grid;
			grid-template-columns: 170px 1fr;
			gap: 6px 8px;
			align-items: center;
			min-width: 520px;
		}
		.edit-grid label {
			color: var(--muted);
			font-size: 12px;
			font-weight: 600;
		}
		.edit-grid input {
			width: 100%;
			padding: 8px 10px;
			border: 1px solid var(--line);
			border-radius: 8px;
			font-size: 13px;
		}
		.actions {
			display: flex;
			flex-direction: column;
			gap: 8px;
			align-items: flex-start;
			min-width: 140px;
		}
		.message {
			margin-top: 6px;
			font-size: 12px;
			color: var(--muted);
		}
		.error {
			background: #fff1f2;
			border: 1px solid #fecdd3;
			color: #9f1239;
			padding: 12px 14px;
			border-radius: 12px;
			margin-bottom: 12px;
			display: none;
		}
		.empty {
			padding: 20px;
			color: var(--muted);
		}
	</style>
</head>
<body>
	<div class="page">
		<div class="header">
			<h1>Correction simple des affaires</h1>
			<p class="subtitle">Outil minimal. Une ligne, trois champs, un enregistrement. Sans logique magique.</p>
		</div>

		<div class="controls">
			<input id="searchInput" type="text" placeholder="Rechercher référence, n° affaire, chantier, site..." />
			<label><input id="onlyProblematicInput" type="checkbox" checked /> Seulement les cas à corriger</label>
			<button class="btn-secondary" id="reloadBtn">Rafraîchir</button>
			<button class="btn-primary" id="openAllBtn">Tout charger</button>
		</div>

		<div class="error" id="errorBox"></div>

		<div class="summary">
			<div class="card">
				<div class="label">Affaires totales</div>
				<div class="value" id="totalAffaires">0</div>
			</div>
			<div class="card">
				<div class="label">Cas à corriger</div>
				<div class="value" id="problematicAffaires">0</div>
			</div>
			<div class="card">
				<div class="label">Lignes affichées</div>
				<div class="value" id="filteredAffaires">0</div>
			</div>
		</div>

		<div class="table-wrap">
			<div class="table-scroll">
				<table>
					<thead>
						<tr>
							<th>Référence</th>
							<th>État</th>
							<th>Valeurs actuelles</th>
							<th>Correction à enregistrer</th>
							<th>Actions</th>
						</tr>
					</thead>
					<tbody id="tableBody">
						<tr><td colspan="5" class="empty">Chargement…</td></tr>
					</tbody>
				</table>
			</div>
		</div>
	</div>

	<script>
		const API_BASE = "http://127.0.0.1:8000/api/affaires-manual-correction-simple";

		const els = {
			searchInput: document.getElementById("searchInput"),
			onlyProblematicInput: document.getElementById("onlyProblematicInput"),
			reloadBtn: document.getElementById("reloadBtn"),
			openAllBtn: document.getElementById("openAllBtn"),
			tableBody: document.getElementById("tableBody"),
			totalAffaires: document.getElementById("totalAffaires"),
			problematicAffaires: document.getElementById("problematicAffaires"),
			filteredAffaires: document.getElementById("filteredAffaires"),
			errorBox: document.getElementById("errorBox"),
		};

		function escapeHtml(value) {
			return String(value ?? "")
				.replaceAll("&", "&amp;")
				.replaceAll("<", "&lt;")
				.replaceAll(">", "&gt;")
				.replaceAll('"', "&quot;");
		}

		function showError(message) {
			els.errorBox.style.display = "block";
			els.errorBox.textContent = message;
		}

		function clearError() {
			els.errorBox.style.display = "none";
			els.errorBox.textContent = "";
		}

		function rowHtml(item) {
			const stateClass = item.is_problematic ? "pill-problem" : "pill-ok";
			const stateLabel = item.is_problematic ? "À corriger" : "OK";

			return `
				<tr data-id="${item.id}">
					<td>
						<div><strong>${escapeHtml(item.reference)}</strong></div>
						<div class="muted">Client: ${escapeHtml(item.client || "—")}</div>
						<div class="muted">Statut: ${escapeHtml(item.statut || "—")}</div>
					</td>
					<td><span class="pill ${stateClass}">${stateLabel}</span></td>
					<td>
						<div class="current-block">
							<div><strong>N° affaire actuel:</strong> ${escapeHtml(item.affaire_nge || "—")}</div>
							<div><strong>Chantier actuel:</strong> ${escapeHtml(item.chantier || "—")}</div>
							<div><strong>Site actuel:</strong> ${escapeHtml(item.site || "—")}</div>
						</div>
					</td>
					<td>
						<div class="edit-grid">
							<label for="nge-${item.id}">N° affaire</label>
							<input id="nge-${item.id}" value="${escapeHtml(item.affaire_nge || "")}" />

							<label for="chantier-${item.id}">Chantier</label>
							<input id="chantier-${item.id}" value="${escapeHtml(item.chantier || "")}" />

							<label for="site-${item.id}">Site</label>
							<input id="site-${item.id}" value="${escapeHtml(item.site || "")}" />
						</div>
					</td>
					<td>
						<div class="actions">
							<button class="btn-save" onclick="saveItem(${item.id})">Enregistrer</button>
							<div class="message" id="msg-${item.id}">—</div>
						</div>
					</td>
				</tr>
			`;
		}

		function render(data) {
			els.totalAffaires.textContent = data.summary.total_affaires ?? 0;
			els.problematicAffaires.textContent = data.summary.problematic_affaires ?? 0;
			els.filteredAffaires.textContent = data.summary.filtered_affaires ?? 0;

			if (!data.items || !data.items.length) {
				els.tableBody.innerHTML = `<tr><td colspan="5" class="empty">Aucun résultat.</td></tr>`;
				return;
			}

			els.tableBody.innerHTML = data.items.map(rowHtml).join("");
		}

		async function loadData() {
			clearError();

			const query = new URLSearchParams({
				query: els.searchInput.value.trim(),
				only_problematic: String(els.onlyProblematicInput.checked),
			});

			try {
				const response = await fetch(`${API_BASE}/list?${query.toString()}`);
				if (!response.ok) {
					throw new Error(`Chargement impossible (${response.status})`);
				}
				const data = await response.json();
				render(data);
			} catch (error) {
				showError(error.message || "Erreur de chargement.");
			}
		}

		async function saveItem(id) {
			clearError();

			const affaire_nge = document.getElementById(`nge-${id}`)?.value ?? "";
			const chantier = document.getElementById(`chantier-${id}`)?.value ?? "";
			const site = document.getElementById(`site-${id}`)?.value ?? "";
			const msg = document.getElementById(`msg-${id}`);
			if (msg) {
				msg.textContent = "Enregistrement…";
			}

			try {
				const response = await fetch(`${API_BASE}/update/${id}`, {
					method: "POST",
					headers: { "Content-Type": "application/json" },
					body: JSON.stringify({ affaire_nge, chantier, site }),
				});

				const payload = await response.json();
				if (!response.ok) {
					throw new Error(payload.detail || `Enregistrement impossible (${response.status})`);
				}

				if (msg) {
					msg.textContent = "Enregistré.";
				}
				await loadData();
			} catch (error) {
				if (msg) {
					msg.textContent = "Erreur.";
				}
				showError(error.message || "Erreur d’enregistrement.");
			}
		}

		window.saveItem = saveItem;

		let debounceTimer = null;
		els.searchInput.addEventListener("input", () => {
			clearTimeout(debounceTimer);
			debounceTimer = setTimeout(loadData, 250);
		});
		els.onlyProblematicInput.addEventListener("change", loadData);
		els.reloadBtn.addEventListener("click", loadData);
		els.openAllBtn.addEventListener("click", () => {
			els.onlyProblematicInput.checked = false;
			loadData();
		});

		loadData();
	</script>
</body>
</html>
