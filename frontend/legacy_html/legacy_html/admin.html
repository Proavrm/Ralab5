<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RaLab4 — Administration</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#f4f4f0;--sidebar:#1e1e2e;--sidebar-t:#a0a0b8;
      --accent:#5b6af0;--accent-h:#4a58d4;
      --surface:#ffffff;--border:#e2e2dc;
      --text:#1a1a2e;--text-m:#6b6b80;
      --danger:#e24b4a;--success:#1d9e75;--warn:#ef9f27;
      --radius:8px;
    }
    body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden}

    /* SIDEBAR */
    #sidebar{width:220px;min-width:220px;background:var(--sidebar);display:flex;flex-direction:column}
    .sidebar-logo{padding:20px 20px 16px;border-bottom:1px solid #2e2e44}
    .sidebar-logo h1{font-size:18px;color:#fff;font-weight:700}
    .sidebar-logo span{font-size:11px;color:var(--sidebar-t)}
    .nav{flex:1;padding:12px 0}
    .nav-section{padding:16px 20px 6px;font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:#4e4e6a}
    .nav-btn{display:flex;align-items:center;gap:10px;width:100%;padding:10px 20px;background:none;border:none;cursor:pointer;color:var(--sidebar-t);font-size:13px;text-align:left;border-left:3px solid transparent;transition:.15s}
    .nav-btn:hover:not(:disabled){background:#2a2a40;color:#fff}
    .nav-btn.active{background:#2a2a40;color:#fff;border-left-color:var(--accent)}
    .nav-btn .icon{font-size:15px;width:20px;text-align:center}
    .sidebar-user{padding:14px 20px;border-top:1px solid #2e2e44}
    .user-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
    .user-av{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0}
    .user-name{font-size:13px;color:#fff;font-weight:500}
    .user-role{font-size:11px;color:var(--sidebar-t);margin-top:1px}
    .btn-logout{width:100%;padding:7px;background:none;border:1px solid #3e3e5a;border-radius:var(--radius);color:var(--sidebar-t);font-size:12px;cursor:pointer;transition:.15s}
    .btn-logout:hover{background:#2a2a40;color:#fff}

    /* CONTENT */
    #content{flex:1;display:flex;flex-direction:column;overflow:hidden}
    #header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:58px;display:flex;align-items:center;gap:12px}
    #page-title{font-size:15px;font-weight:600;flex:1}
    #main{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:16px}

    /* TABS */
    .tabs{display:flex;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:4px;width:fit-content}
    .tab{padding:7px 18px;border-radius:6px;border:none;background:none;font-size:13px;font-weight:500;cursor:pointer;color:var(--text-m);transition:.15s}
    .tab:hover{background:var(--bg);color:var(--text)}
    .tab.active{background:var(--accent);color:#fff}

    .tab-panel{display:none;flex-direction:column;gap:16px}
    .tab-panel.active{display:flex}

    /* CARDS */
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
    .card-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
    .card-title{font-size:13px;font-weight:600}
    .card-body{padding:18px}

    /* BUTTONS */
    .btn{padding:7px 14px;border-radius:var(--radius);font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text);transition:.15s;white-space:nowrap}
    .btn:hover{background:var(--bg)}
    .btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
    .btn.primary:hover{background:var(--accent-h)}
    .btn.danger{color:var(--danger);border-color:#f0c0c0}
    .btn.danger:hover{background:#fff0f0}
    .btn.success{color:var(--success);border-color:#c0e8d8}
    .btn.success:hover{background:#f0faf5}
    .btn.sm{padding:4px 10px;font-size:12px}

    /* TABLE */
    table{width:100%;border-collapse:collapse;font-size:13px}
    thead th{background:var(--bg);padding:9px 14px;text-align:left;font-weight:500;font-size:12px;color:var(--text-m);border-bottom:1px solid var(--border);white-space:nowrap}
    tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
    tbody tr:last-child{border-bottom:none}
    tbody tr:hover{background:#f8f8fc}
    td{padding:9px 14px;vertical-align:middle}

    /* BADGES */
    .badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:500}
    .b-green{background:#eaf3de;color:#3b6d11}
    .b-red{background:#fcebeb;color:#a32d2d}
    .b-blue{background:#e6f1fb;color:#185fa5}
    .b-purple{background:#eeedfe;color:#534ab7}
    .b-amber{background:#faeeda;color:#854f0b}
    .b-gray{background:#f1efe8;color:#5f5e5a}

    /* ROLE PERMISSIONS MATRIX */
    .perm-matrix{width:100%;border-collapse:collapse;font-size:13px}
    .perm-matrix th{background:var(--bg);padding:10px 14px;font-weight:500;font-size:12px;color:var(--text-m);border-bottom:1px solid var(--border);text-align:left}
    .perm-matrix th:not(:first-child){text-align:center;min-width:90px}
    .perm-matrix td{padding:9px 14px;border-bottom:1px solid var(--border);font-size:13px}
    .perm-matrix td:not(:first-child){text-align:center}
    .perm-matrix tr:last-child td{border-bottom:none}
    .perm-matrix tr:hover td{background:#f8f8fc}
    .perm-label{font-weight:500}
    .perm-code{font-size:11px;color:var(--text-m);margin-top:2px;font-family:monospace}
    .cb-wrap{display:flex;justify-content:center}
    input[type=checkbox]{width:16px;height:16px;accent-color:var(--accent);cursor:pointer}

    /* MODAL */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:100}
    .modal-overlay.hidden{display:none}
    .modal{background:var(--surface);border-radius:12px;width:520px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.18)}
    .modal-header{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
    .modal-header h2{font-size:15px;font-weight:600}
    .modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--text-m);line-height:1}
    .modal-body{padding:22px 24px;display:flex;flex-direction:column;gap:14px}
    .modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px}
    .form-group{display:flex;flex-direction:column;gap:5px}
    .form-group label{font-size:12px;font-weight:500;color:var(--text-m)}
    .form-group input,.form-group select{padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;outline:none;background:var(--bg);transition:border-color .15s}
    .form-group input:focus,.form-group select:focus{border-color:var(--accent);background:#fff}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .form-hint{font-size:11px;color:var(--text-m);margin-top:2px}

    /* TOAST */
    #toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:var(--radius);font-size:13px;font-weight:500;z-index:200;transform:translateY(80px);opacity:0;transition:all .3s;pointer-events:none}
    #toast.show{transform:translateY(0);opacity:1}
    #toast.success{background:var(--success);color:#fff}
    #toast.error{background:var(--danger);color:#fff}
    #toast.info{background:#1a1a2e;color:#fff}

    .empty{padding:40px;text-align:center;color:var(--text-m);font-size:13px}
  </style>
</head>
<body>

<nav id="sidebar">
  <div class="sidebar-logo">
    <h1>RaLab4</h1>
    <span>Administration</span>
  </div>
  <div class="nav">
    <div class="nav-section">Navigation</div>
    <button class="nav-btn" onclick="window.location.href='index.html'"><span class="icon">🏠</span> Dashboard</button>
    <button class="nav-btn" onclick="window.location.href='affaires.html'"><span class="icon">📋</span> Affaires RST</button>
<button class="nav-btn" onclick="window.location.href='passations.html'"><span class="icon">🤝</span> Passations</button>
        <button class="nav-btn" onclick="window.location.href='demandes.html'"><span class="icon">📂</span> Demandes</button>
    <button class="nav-btn" onclick="window.location.href='dst.html'"><span class="icon">📁</span> DST</button>
    <button class="nav-btn" onclick="window.location.href='planning.html'"><span class="icon">📅</span> Planning</button>
    <div class="nav-section">À venir</div>
    <button class="nav-btn" disabled><span class="icon">📍</span> G3</button>
    <button class="nav-btn" disabled><span class="icon">🔬</span> Laboratoire</button>
    <div class="nav-section">Administration</div>
    <button class="nav-btn" onclick="window.location.href='audits.html'"><span class="icon">🔍</span> Audits</button>
    <button class="nav-btn" onclick="window.location.href='tools.html'"><span class="icon">🔧</span> Outils</button>
    <button class="nav-btn active"><span class="icon">⚙️</span> Utilisateurs</button>
  </div>
  <div class="sidebar-user">
    <div class="user-row">
      <div class="user-av" id="sidebar-av">?</div>
      <div><div class="user-name" id="sidebar-name">—</div><div class="user-role" id="sidebar-role">—</div></div>
    </div>
    <button class="btn-logout" onclick="logout()">↩ Déconnexion</button>
  </div>
</nav>

<div id="content">
  <div id="header">
    <div id="page-title">Administration — Utilisateurs & Droits</div>
    <button class="btn primary" id="btn-new-user" onclick="openCreateUser()">+ Nouvel utilisateur</button>
  </div>

  <div id="main">

    <div class="tabs">
      <button class="tab active" onclick="switchTab('users')">👤 Utilisateurs</button>
      <button class="tab" onclick="switchTab('roles')">🔑 Rôles & Permissions</button>
    </div>

    <!-- TAB: UTILISATEURS -->
    <div class="tab-panel active" id="tab-users">
      <div class="card">
        <div class="card-header">
          <span class="card-title">Comptes utilisateurs</span>
          <span id="users-count" style="font-size:12px;color:var(--text-m)">—</span>
        </div>
        <table>
          <thead>
            <tr>
              <th>Nom</th>
              <th>Email</th>
              <th>Rôle</th>
              <th>Service</th>
              <th>Statut</th>
              <th>Permissions</th>
              <th style="text-align:right">Actions</th>
            </tr>
          </thead>
          <tbody id="users-tbody">
            <tr><td colspan="7"><div class="empty">Chargement...</div></td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- TAB: RÔLES & PERMISSIONS -->
    <div class="tab-panel" id="tab-roles">
      <div class="card">
        <div class="card-header">
          <span class="card-title">Matrice des permissions par rôle</span>
          <div style="display:flex;gap:8px">
            <button class="btn sm" onclick="resetPermMatrix()">↺ Annuler</button>
            <button class="btn primary sm" onclick="savePermMatrix()">💾 Enregistrer les modifications</button>
          </div>
        </div>
        <div style="overflow-x:auto">
          <table class="perm-matrix" id="perm-matrix">
            <thead id="matrix-head"></thead>
            <tbody id="matrix-body"></tbody>
          </table>
        </div>
      </div>

      <div class="card">
        <div class="card-header"><span class="card-title">Résumé des rôles</span></div>
        <div class="card-body">
          <div id="roles-summary" style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px"></div>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- MODAL UTILISATEUR -->
<div class="modal-overlay hidden" id="user-modal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="user-modal-title">Nouvel utilisateur</h2>
      <button class="modal-close" onclick="closeUserModal()">×</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="um-original-email" />
      <div class="form-row">
        <div class="form-group">
          <label>Email *</label>
          <input id="um-email" type="email" placeholder="prenom.nom@nge.fr" />
          <span class="form-hint">Utilisé pour l'identification Windows</span>
        </div>
        <div class="form-group">
          <label>Nom complet *</label>
          <input id="um-name" type="text" placeholder="Prénom Nom" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Rôle *</label>
          <select id="um-role">
            <option value="admin">Administrateur</option>
            <option value="labo">Laboratoire</option>
            <option value="etudes">Études</option>
            <option value="consult">Consultation</option>
          </select>
        </div>
        <div class="form-group">
          <label>Service / Agence *</label>
          <input id="um-service" type="text" placeholder="rst, labo, etudes..." />
        </div>
      </div>
      <div class="form-group">
        <label>Statut</label>
        <select id="um-active">
          <option value="true">Actif</option>
          <option value="false">Inactif</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeUserModal()">Annuler</button>
      <button class="btn primary" onclick="saveUser()">Enregistrer</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  const API='http://127.0.0.1:8000';
  let user=null,token=null;
  let allUsers=[],allRoles=[],allPerms=[];
  let matrixState={};  // role_code → Set(permission_codes)
  let editingEmail=null;

  // ── INIT ──────────────────────────────────────────────────────────────────
  async function init(){
    token=localStorage.getItem('ralab_token');
    user=JSON.parse(localStorage.getItem('ralab_user')||'null');
    if(!token||!user){window.location.href='login.html';return;}

    // Verificar permissão
    if(!(user.permissions||[]).includes('manage_users')){
      alert('Accès refusé — permission manage_users requise.');
      window.location.href='index.html';
      return;
    }

    renderSidebar();
    await Promise.all([loadUsers(),loadRoles(),loadPerms()]);
    renderMatrix();
    renderRolesSummary();
  }

  function ah(){return{'Authorization':`Bearer ${token}`,'Content-Type':'application/json'};}
  function logout(){localStorage.removeItem('ralab_token');localStorage.removeItem('ralab_user');window.location.href='login.html';}

  function renderSidebar(){
    const initials=user.display_name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    document.getElementById('sidebar-av').textContent=initials;
    document.getElementById('sidebar-name').textContent=user.display_name;
    document.getElementById('sidebar-role').textContent='Administrateur';
  }

  // ── TABS ──────────────────────────────────────────────────────────────────
  function switchTab(tab){
    document.querySelectorAll('.tab').forEach((t,i)=>{
      const tabs=['users','roles'];
      t.classList.toggle('active',tabs[i]===tab);
    });
    document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
    document.getElementById(`tab-${tab}`).classList.add('active');
  }

  // ── USERS ─────────────────────────────────────────────────────────────────
  async function loadUsers(){
    const r=await fetch(`${API}/api/admin/users`,{headers:ah()});
    allUsers=await r.json();
    renderUsersTable();
  }

  function renderUsersTable(){
    const tbody=document.getElementById('users-tbody');
    document.getElementById('users-count').textContent=`${allUsers.length} compte${allUsers.length!==1?'s':''}`;

    if(!allUsers.length){tbody.innerHTML='<tr><td colspan="7"><div class="empty">Aucun utilisateur.</div></td></tr>';return;}

    tbody.innerHTML=allUsers.map(u=>`
      <tr>
        <td>
          <div style="display:flex;align-items:center;gap:10px">
            <div style="width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0">
              ${u.display_name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()}
            </div>
            <span style="font-weight:500">${u.display_name}</span>
          </div>
        </td>
        <td style="color:var(--text-m);font-size:12px">${u.email}</td>
        <td>${roleBadge(u.role_code)}</td>
        <td style="font-size:12px">${u.service_code}</td>
        <td>${u.is_active?'<span class="badge b-green">Actif</span>':'<span class="badge b-red">Inactif</span>'}</td>
        <td>
          <div style="display:flex;flex-wrap:wrap;gap:4px;max-width:280px">
            ${u.permissions.slice(0,4).map(p=>`<span class="badge b-gray" style="font-size:10px">${permLabel(p)}</span>`).join('')}
            ${u.permissions.length>4?`<span class="badge b-gray" style="font-size:10px">+${u.permissions.length-4}</span>`:''}
          </div>
        </td>
        <td>
          <div style="display:flex;gap:6px;justify-content:flex-end">
            <button class="btn sm" onclick="openEditUser('${u.email}')">✏️ Modifier</button>
            ${u.email!==user.email
              ? u.is_active
                ? `<button class="btn sm danger" onclick="toggleActive('${u.email}',false)">Désactiver</button>`
                : `<button class="btn sm success" onclick="toggleActive('${u.email}',true)">Activer</button>`
              : '<span style="font-size:11px;color:var(--text-m)">Compte actuel</span>'
            }
          </div>
        </td>
      </tr>`).join('');
  }

  function openCreateUser(){
    editingEmail=null;
    document.getElementById('user-modal-title').textContent='Nouvel utilisateur';
    document.getElementById('um-original-email').value='';
    document.getElementById('um-email').value='';
    document.getElementById('um-email').readOnly=false;
    document.getElementById('um-name').value='';
    document.getElementById('um-role').value='labo';
    document.getElementById('um-service').value='';
    document.getElementById('um-active').value='true';
    document.getElementById('user-modal').classList.remove('hidden');
  }

  function openEditUser(email){
    const u=allUsers.find(x=>x.email===email);
    if(!u)return;
    editingEmail=email;
    document.getElementById('user-modal-title').textContent='Modifier l\'utilisateur';
    document.getElementById('um-original-email').value=email;
    document.getElementById('um-email').value=u.email;
    document.getElementById('um-email').readOnly=true;
    document.getElementById('um-name').value=u.display_name;
    document.getElementById('um-role').value=u.role_code;
    document.getElementById('um-service').value=u.service_code;
    document.getElementById('um-active').value=String(u.is_active);
    document.getElementById('user-modal').classList.remove('hidden');
  }

  function closeUserModal(){document.getElementById('user-modal').classList.add('hidden');}

  async function saveUser(){
    const email=document.getElementById('um-email').value.trim().toLowerCase();
    const name=document.getElementById('um-name').value.trim();
    const role=document.getElementById('um-role').value;
    const service=document.getElementById('um-service').value.trim();
    const active=document.getElementById('um-active').value==='true';

    if(!email||!name||!role||!service){showToast('Tous les champs sont obligatoires.','error');return;}

    try{
      let r;
      if(!editingEmail){
        r=await fetch(`${API}/api/admin/users`,{method:'POST',headers:ah(),
          body:JSON.stringify({email,display_name:name,role_code:role,service_code:service,is_active:active})});
      }else{
        r=await fetch(`${API}/api/admin/users/${encodeURIComponent(editingEmail)}`,{method:'PUT',headers:ah(),
          body:JSON.stringify({display_name:name,role_code:role,service_code:service,is_active:active})});
      }
      if(!r.ok){const e=await r.json();throw new Error(e.detail||'Erreur');}
      closeUserModal();
      await loadUsers();
      showToast(editingEmail?'Utilisateur mis à jour ✓':'Utilisateur créé ✓','success');
    }catch(e){showToast('Erreur : '+e.message,'error');}
  }

  async function toggleActive(email,active){
    const action=active?'activer':'désactiver';
    if(!confirm(`${active?'Activer':'Désactiver'} le compte ${email} ?`))return;
    try{
      const r=await fetch(`${API}/api/admin/users/${encodeURIComponent(email)}/active`,
        {method:'PATCH',headers:ah(),body:JSON.stringify({is_active:active})});
      if(!r.ok)throw new Error();
      await loadUsers();
      showToast(`Compte ${active?'activé':'désactivé'} ✓`,'success');
    }catch(e){showToast('Erreur lors de la modification.','error');}
  }

  // ── ROLES & PERMISSIONS ───────────────────────────────────────────────────
  async function loadRoles(){
    const r=await fetch(`${API}/api/admin/roles`,{headers:ah()});
    allRoles=await r.json();
    // Initialiser l'état de la matrice
    allRoles.forEach(role=>{matrixState[role.role_code]=new Set(role.permissions);});
  }

  async function loadPerms(){
    const r=await fetch(`${API}/api/admin/permissions`,{headers:ah()});
    allPerms=await r.json();
  }

  function renderMatrix(){
    if(!allRoles.length||!allPerms.length)return;

    // En-tête: une colonne par role
    const head=document.getElementById('matrix-head');
    head.innerHTML=`<tr>
      <th style="min-width:240px">Permission</th>
      ${allRoles.map(r=>`<th>${r.label}<br><span style="font-family:monospace;font-size:10px;font-weight:400">${r.role_code}</span></th>`).join('')}
    </tr>`;

    // Corps: une ligne par permission
    const body=document.getElementById('matrix-body');
    body.innerHTML=allPerms.map(p=>`
      <tr>
        <td>
          <div class="perm-label">${p.label}</div>
          <div class="perm-code">${p.permission_code}</div>
        </td>
        ${allRoles.map(r=>`
          <td>
            <div class="cb-wrap">
              <input type="checkbox"
                data-role="${r.role_code}"
                data-perm="${p.permission_code}"
                ${matrixState[r.role_code]?.has(p.permission_code)?'checked':''}
                onchange="onMatrixChange(this)"
              />
            </div>
          </td>`).join('')}
      </tr>`).join('');
  }

  function onMatrixChange(cb){
    const role=cb.dataset.role;
    const perm=cb.dataset.perm;
    if(cb.checked)matrixState[role].add(perm);
    else matrixState[role].delete(perm);
    renderRolesSummary();
  }

  function resetPermMatrix(){
    allRoles.forEach(role=>{matrixState[role.role_code]=new Set(role.permissions);});
    renderMatrix();
    renderRolesSummary();
    showToast('Modifications annulées','info');
  }

  async function savePermMatrix(){
    if(!confirm('Enregistrer les nouvelles permissions pour tous les rôles ?'))return;
    let errors=0;
    for(const role of allRoles){
      try{
        const perms=Array.from(matrixState[role.role_code]);
        const r=await fetch(`${API}/api/admin/roles/${role.role_code}/permissions`,
          {method:'PUT',headers:ah(),body:JSON.stringify({permissions:perms})});
        if(!r.ok)throw new Error();
      }catch{errors++;}
    }
    await loadRoles();
    if(errors===0)showToast('Permissions enregistrées ✓','success');
    else showToast(`${errors} erreur(s) lors de l'enregistrement`,'error');
  }

  function renderRolesSummary(){
    const el=document.getElementById('roles-summary');
    el.innerHTML=allRoles.map(r=>{
      const perms=Array.from(matrixState[r.role_code]||[]);
      return`<div style="background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:14px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
          ${roleBadge(r.role_code)}
          <span style="font-size:12px;color:var(--text-m)">${perms.length} permission${perms.length!==1?'s':''}</span>
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:4px">
          ${perms.map(p=>`<span class="badge b-gray" style="font-size:10px">${permLabel(p)}</span>`).join('')}
          ${!perms.length?'<span style="font-size:12px;color:var(--text-m)">Aucune permission</span>':''}
        </div>
      </div>`;
    }).join('');
  }

  // ── HELPERS ───────────────────────────────────────────────────────────────
  function roleBadge(code){
    const m={admin:'b-purple',labo:'b-blue',etudes:'b-green',consult:'b-gray'};
    const l={admin:'Admin',labo:'Labo',etudes:'Études',consult:'Consult'};
    return`<span class="badge ${m[code]||'b-gray'}">${l[code]||code}</span>`;
  }

  function permLabel(code){
    const p=allPerms.find(x=>x.permission_code===code);
    return p?p.label.replace('Voir le ','').replace('Voir les ','').replace('Voir la ',''):code;
  }

  function showToast(msg,type='info'){
    const t=document.getElementById('toast');
    t.textContent=msg;t.className=`show ${type}`;
    setTimeout(()=>t.className='',3200);
  }

  document.addEventListener('keydown',e=>{if(e.key==='Escape')closeUserModal();});
  init();
</script>
</body>
</html>
