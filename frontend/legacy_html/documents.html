<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>RaLab4 — Documents liés à la demande</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f4f4f0;--sidebar:#1e1e2e;--sidebar-t:#a0a0b8;--accent:#5b6af0;--nge:#002C77;--surface:#fff;--border:#e2e2dc;--text:#1a1a2e;--text-m:#6b6b80;--danger:#e24b4a;--success:#1d9e75;--warn:#ef9f27;--radius:8px;}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden}
#sidebar{width:220px;min-width:220px;background:var(--sidebar);display:flex;flex-direction:column}
.sidebar-logo{padding:20px 20px 16px;border-bottom:1px solid #2e2e44}
.sidebar-logo h1{font-size:18px;color:#fff;font-weight:700}
.sidebar-logo span{font-size:11px;color:var(--sidebar-t)}
.nav{flex:1;padding:12px 0}
.nav-section{padding:16px 20px 6px;font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:#4e4e6a}
.nav-btn{display:flex;align-items:center;gap:10px;width:100%;padding:10px 20px;background:none;border:none;cursor:pointer;color:var(--sidebar-t);font-size:13px;text-align:left;border-left:3px solid transparent;transition:.15s}
.nav-btn:hover:not(:disabled){background:#2a2a40;color:#fff}
.nav-btn.active{background:#2a2a40;color:#fff;border-left-color:var(--accent)}
.sidebar-user{padding:14px 20px;border-top:1px solid #2e2e44}
.user-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.user-av{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff}
.user-name{font-size:13px;color:#fff;font-weight:500}
.user-role{font-size:11px;color:var(--sidebar-t);margin-top:1px}
.btn-logout{width:100%;padding:7px;background:none;border:1px solid #3e3e5a;border-radius:var(--radius);color:var(--sidebar-t);font-size:12px;cursor:pointer;transition:.15s}
.btn-logout:hover{background:#2a2a40;color:#fff}
#main{flex:1;overflow-y:auto}
.page-header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px;height:58px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
.back-btn{display:flex;align-items:center;gap:6px;color:var(--text-m);font-size:13px;cursor:pointer;background:none;border:none;padding:5px 10px;border-radius:var(--radius);transition:.15s}
.back-btn:hover{background:var(--bg);color:var(--text)}
.page-title{font-size:15px;font-weight:600;flex:1}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:13px;cursor:pointer;transition:.15s;font-family:inherit}
.btn:hover{background:var(--bg)} .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.content{padding:28px;max-width:1040px;margin:0 auto;display:flex;flex-direction:column;gap:18px}
.hero{background:var(--surface);border-radius:10px;border:1px solid var(--border);padding:22px 26px}
.hero-top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px}
.hero-ref{font-size:22px;font-weight:700;color:var(--accent)}
.hero-sub{font-size:13px;color:var(--text-m);margin-top:4px}
.hero-badges{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.b-gray{background:#f1efe8;color:#5f5e5a} .b-green{background:#eaf3de;color:#3b6d11} .b-blue{background:#e6f1fb;color:#185fa5} .b-amber{background:#faeeda;color:#854f0b} .b-red{background:#fcebeb;color:#a32d2d}
.card-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.card{background:var(--surface);border-radius:10px;border:1px solid var(--border);padding:18px 20px}
.card.full{grid-column:1/-1}
.card-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-m);margin-bottom:14px;border-bottom:1px solid var(--border);padding-bottom:6px}
.field-row{display:flex;flex-direction:column;gap:3px;margin-bottom:11px}
.field-row:last-child{margin-bottom:0}
.field-label{font-size:10px;color:var(--text-m)}
.field-value{font-size:13px;font-weight:500;color:var(--text)}
.field-value.empty{color:var(--text-m);font-style:italic;font-weight:400}
.text-block{font-size:13px;line-height:1.7;color:var(--text);white-space:pre-wrap}
.text-block.empty{color:var(--text-m);font-style:italic}
.module-banner{display:none;align-items:flex-start;gap:10px;padding:12px 16px;border:1px solid #f1d39a;background:#fff6e6;color:#7a4a00;border-radius:10px}
.module-banner.show{display:flex}
.module-banner strong{display:block;font-size:13px}
.module-banner span{display:block;font-size:12px;color:#8a6a32;margin-top:2px}
.notice{background:#eef4ff;border:1px solid #cfddff;border-radius:10px;padding:14px 16px;font-size:13px;line-height:1.6;color:#204575}
.module-grid{display:flex;flex-wrap:wrap;gap:8px}
.module-chip{display:inline-flex;align-items:center;padding:5px 10px;border:1px solid var(--border);border-radius:999px;background:var(--bg);font-size:12px;font-weight:500}
.empty-state{padding:42px 24px;text-align:center;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text-m)}
.actions{display:flex;gap:10px;flex-wrap:wrap}
</style>
</head>
<body>
<nav id="sidebar">
  <div class="sidebar-logo"><h1>RaLab4</h1><span>Laboratoire géotechnique</span></div>
  <div class="nav">
    <div class="nav-section">Navigation</div>
    <button class="nav-btn" onclick="go('index.html')">🏠 Dashboard</button>
    <button class="nav-btn" onclick="go('affaires.html')">📋 Affaires RST</button>
    <button class="nav-btn" onclick="go('passations.html')">🤝 Passations</button>
    <button class="nav-btn active" onclick="go('demandes.html')">📂 Demandes</button>
    <button class="nav-btn" onclick="go('dst.html')">📁 DST</button>
    <button class="nav-btn" onclick="go('planning.html')">📅 Planning</button>
    <button class="nav-btn" onclick="go('audits.html')">🔍 Audits</button>
    <div class="nav-section">Administration</div>
    <button class="nav-btn" onclick="go('tools.html')">🔧 Outils</button>
  </div>
  <div class="sidebar-user">
    <div class="user-row">
      <div class="user-av" id="sidebar-av">?</div>
      <div><div class="user-name" id="sidebar-name">—</div><div class="user-role" id="sidebar-role">—</div></div>
    </div>
    <button class="btn-logout" onclick="logout()">↩ Déconnexion</button>
  </div>
</nav>
<div id="main">
  <div class="page-header">
    <button class="back-btn" onclick="goBack()">← Demande</button>
    <span class="page-title">Documents liés à la demande</span>
    <button class="btn" onclick="openPreparation()">⚙️ Préparation</button>
    <button class="btn" onclick="openAffaire()">📋 Affaire</button>
  </div>
  <div class="content" id="content"><div class="empty-state">Chargement…</div></div>
</div>
<script>
const API='http://127.0.0.1:8000';
const qs=new URLSearchParams(window.location.search);
const demandeId=parseInt(qs.get('demande_id')||'0',10)||0;
let user={};
let demande=null;
let navigationData=null;
function esc(v){return String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;',"'":'&#39;'}[m]));}
function fd(v){if(!v)return'—'; const d=new Date(v); return isNaN(d)?String(v):d.toLocaleDateString('fr-FR');}
function ah(){const h={'Content-Type':'application/json'}; const t=localStorage.getItem('ralab_token')||''; if(t) h.Authorization='Bearer '+t; return h;}
function go(url){window.location.href=url;}
function logout(){localStorage.removeItem('ralab_token'); window.location.href='login.html';}
function goBack(){if(demandeId) go(`demande.html?uid=${demandeId}`); else go('demandes.html');}
function openAffaire(){ if(demande?.affaire_rst_id) go(`affaire.html?uid=${demande.affaire_rst_id}`); }
function openPreparation(){ if(demandeId) go(`demande.html?uid=${demandeId}`); }
function sidebarUser(){
  const initials=(user.display_name||user.login||'?').split(/\s+/).map(x=>x[0]||'').join('').slice(0,2).toUpperCase();
  document.getElementById('sidebar-av').textContent=initials||'?';
  document.getElementById('sidebar-name').textContent=user.display_name||user.login||'Utilisateur';
  document.getElementById('sidebar-role').textContent=user.role_code||'—';
}
async function loadUser(){
  try{
    const r=await fetch(`${API}/api/auth/me`,{headers:ah()});
    user=r.ok?await r.json():{};
  }catch{ user={}; }
  sidebarUser();
}
function enabledModules(){ return (navigationData?.modules||[]).filter(m=>m.is_enabled); }
function moduleEnabled(){ return !!navigationData?.visibility?.documents; }
function demandBadges(){
  const badges=[];
  if(demande?.statut) badges.push(`<span class="badge b-blue">${esc(demande.statut)}</span>`);
  if(demande?.priorite) badges.push(`<span class="badge b-amber">${esc(demande.priorite)}</span>`);
  badges.push(`<span class="badge ${moduleEnabled()?'b-green':'b-red'}">${moduleEnabled()?'Module activé':'Module non activé'}</span>`);
  return badges.join(' ');
}
function moduleBannerHtml(){
  if(moduleEnabled()) return '';
  return `<div class="module-banner show"><div>📎</div><div><strong>Module Documents non activé</strong><span>Cette demande n'ouvre pas encore ce bloc. L'écran reste accessible pour garder une navigation cohérente, mais il est verrouillé tant que le module n'est pas activé.</span></div></div>`;
}
function moduleChipHtml(){
  const mods=enabledModules();
  if(!mods.length) return '<div class="field-value empty">Aucun module activé</div>';
  return mods.map(m=>`<span class="module-chip">${esc(m.label)}</span>`).join('');
}
async function loadContext(){
  if(!demandeId){
    document.getElementById('content').innerHTML='<div class="empty-state">Aucune demande ciblée.<br><button class="btn" style="margin-top:12px" onclick="go('demandes.html')">← Retour aux demandes</button></div>';
    return;
  }
  await loadUser();
  try{
    const [dr,nr]=await Promise.all([
      fetch(`${API}/api/demandes_rst/${demandeId}`,{headers:ah()}),
      fetch(`${API}/api/demandes_rst/${demandeId}/navigation`,{headers:ah()}),
    ]);
    if(!dr.ok) throw new Error('Demande introuvable');
    demande=await dr.json();
    navigationData=nr.ok?await nr.json():null;
    render();
  }catch(err){
    document.getElementById('content').innerHTML=`<div class="empty-state">${esc(err.message||'Erreur de chargement')}<br><button class="btn" style="margin-top:12px" onclick="goBack()">← Retour</button></div>`;
  }
}
function render(){
  const p=navigationData?.preparation||{};
  const html=`
    <div class="hero">
      <div class="hero-top">
        <div>
          <div class="hero-ref">${esc(demande.reference||'—')}</div>
          <div class="hero-sub">${esc(demande.chantier||demande.client||'—')} · 📎 Documents liés à la demande</div>
          <div class="hero-badges">${demandBadges()}</div>
        </div>
      </div>
    </div>
    ${moduleBannerHtml()}
    <div class="card-grid">
      <div class="card">
        <div class="card-title">Contexte demande</div>
        <div class="field-row"><div class="field-label">Affaire</div><div class="field-value">${esc(demande.affaire_ref||'—')}</div></div>
        <div class="field-row"><div class="field-label">Demandeur</div><div class="field-value ${demande.demandeur?'':'empty'}">${esc(demande.demandeur||'—')}</div></div>
        <div class="field-row"><div class="field-label">Échéance</div><div class="field-value ${demande.date_echeance?'':'empty'}">${fd(demande.date_echeance)}</div></div>
        <div class="field-row"><div class="field-label">Modules activés</div><div class="module-grid">${moduleChipHtml()}</div></div>
      </div>
      <div class="card">
        <div class="card-title">Préparation utile au bloc</div>
        <div class="field-row"><div class="field-label">Phase opération</div><div class="field-value ${p.phase_operation?'':'empty'}">${esc(p.phase_operation||'—')}</div></div>
        <div class="field-row"><div class="field-label">Attentes client</div><p class="text-block ${p.attentes_client?'':'empty'}">${esc(p.attentes_client||'—')}</p></div>
        <div class="field-row"><div class="field-label">Points de vigilance</div><p class="text-block ${p.points_vigilance?'':'empty'}">${esc(p.points_vigilance||'—')}</p></div>
      </div>
      <div class="card full">
        <div class="card-title">Références documentaires déjà connues</div>
        <div class="card-grid">
          <div class="card">
            <div class="field-row"><div class="field-label">Réf. rapport</div><div class="field-value ${demande.rapport_ref?'':'empty'}">${esc(demande.rapport_ref||'—')}</div></div>
            <div class="field-row"><div class="field-label">Réf. devis</div><div class="field-value ${demande.devis_ref?'':'empty'}">${esc(demande.devis_ref||'—')}</div></div>
            <div class="field-row"><div class="field-label">Réf. facture</div><div class="field-value ${demande.facture_ref?'':'empty'}">${esc(demande.facture_ref||'—')}</div></div>
            <div class="field-row"><div class="field-label">Rapport envoyé</div><div class="field-value">${demande.rapport_envoye?'Oui':'Non'}</div></div>
          </div>
          <div class="card">
            <div class="field-row"><div class="field-label">Description</div><p class="text-block ${demande.description?'':'empty'}">${esc(demande.description||'—')}</p></div>
            <div class="field-row"><div class="field-label">Observations</div><p class="text-block ${demande.observations?'':'empty'}">${esc(demande.observations||'—')}</p></div>
          </div>
        </div>
      </div>
      <div class="card full">
        <div class="card-title">Bloc documents</div>
        <div class="notice">Ce bloc est maintenant raccordé à la logique des modules activés. Quand il est activé, l'écran devient un point d'entrée cohérent pour les futurs registres de pièces reçues, livrables émis, versions, visas et pièces client. Quand il est désactivé, l'accès reste visible mais verrouillé.</div>
        <div class="actions" style="margin-top:14px">
          <button class="btn" onclick="openPreparation()">⚙️ Revenir à la préparation</button>
          <button class="btn" onclick="goBack()">← Retour à la demande</button>
        </div>
      </div>
    </div>`;
  document.getElementById('content').innerHTML=html;
}

loadContext();
</script>
</body>
</html>
