<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>RaLab4 — Planning</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --nge:#002C77;--nge-l:#E8EFF8;--nge-m:#4A7DB5;--nge-d:#000F2B;
  --yel:#E6A817;--yel-l:#FEF5E0;--yel-d:#8A6410;
  --bg:#F2F4F8;--surface:#fff;--border:#DDE3EE;
  --text:#0A1628;--tm:#4A5568;--th:#8896A8;
  --ok:#1d9e75;--ok-l:#eaf3de;--danger:#e24b4a;--danger-l:#fcebeb;
  --r:6px;--rl:10px;
}
html,body{height:100%;overflow:hidden}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;user-select:none}

/* TOPBAR */
#topbar{background:var(--nge);height:48px;display:flex;align-items:stretch;padding:0 14px;flex-shrink:0}
.tb-brand{display:flex;align-items:center;margin-right:12px}
.tb-logo{font-size:14px;font-weight:700;color:#fff}.tb-logo span{color:var(--yel)}
.tb-sep{width:1px;background:rgba(255,255,255,.15);margin:9px 2px}
.tb-tabs{display:flex;align-items:stretch}
.tb-tab{display:flex;align-items:center;gap:5px;padding:0 13px;border:none;background:transparent;cursor:pointer;font-size:12px;font-weight:600;color:rgba(255,255,255,.45);border-bottom:3px solid transparent;transition:.12s;white-space:nowrap}
.tb-tab:hover{color:rgba(255,255,255,.8)}.tb-tab.on{color:#fff;border-bottom-color:var(--yel)}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:5px}
.tb-fsel{padding:3px 7px;border:1px solid rgba(255,255,255,.18);border-radius:var(--r);background:rgba(255,255,255,.08);color:rgba(255,255,255,.7);font-size:11px;outline:none}
.tb-stat{background:rgba(255,255,255,.09);border-radius:var(--r);padding:3px 8px;text-align:center;cursor:pointer;border:1px solid transparent;transition:.12s}
.tb-stat:hover{background:rgba(255,255,255,.16)}.tb-stat.on{background:var(--yel);border-color:var(--yel)}
.tb-sn{font-size:12px;font-weight:700;color:#fff;line-height:1}.tb-stat.on .tb-sn{color:var(--yel-d)}
.tb-sl{font-size:8px;text-transform:uppercase;letter-spacing:.04em;color:rgba(255,255,255,.4)}.tb-stat.on .tb-sl{color:rgba(138,100,16,.7)}
.ctx-banner{display:none;align-items:center;justify-content:space-between;gap:12px;padding:10px 14px;background:#fff6e6;border-bottom:1px solid #f1d39a;color:#7a4a00;font-size:13px}
.ctx-banner.show{display:flex}
.ctx-banner strong{display:block;font-size:13px}
.ctx-banner span{display:block;font-size:12px;color:#8a6a32;margin-top:2px}
.ctx-banner .ctx-actions{display:flex;gap:8px;flex-shrink:0}
.ctx-banner .ctx-btn{padding:6px 10px;border-radius:6px;border:1px solid #d7bf8a;background:#fff;color:#7a4a00;cursor:pointer;font-size:12px;font-weight:600}
.ctx-banner .ctx-btn:hover{background:#fffaf0}

/* VIEWS */
.view{display:none;flex:1;overflow:hidden;min-height:0;position:relative}.view.on{display:flex}
.bd{display:inline-flex;align-items:center;padding:1px 5px;border-radius:20px;font-size:9px;font-weight:700}
.bn{background:var(--nge-l);color:var(--nge)}.by{background:var(--yel-l);color:var(--yel-d)}
.bk{background:#eaf3de;color:#3b6d11}.br{background:#fcebeb;color:#a32d2d}.bt{background:#e1f5ee;color:#0f6e56}

/* HEATMAP */
.hmg{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.hmdh{font-size:8px;font-weight:600;color:var(--th);text-align:center;padding-bottom:2px}
.hmd{border-radius:3px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:.1s;border:1.5px solid transparent;position:relative;aspect-ratio:1}
.hmd:hover{border-color:var(--nge-m);z-index:2}.hmd.sel{border-color:var(--yel)!important;box-shadow:0 0 0 1.5px var(--yel)}
.hmdn{font-size:9px;font-weight:500;line-height:1}.hmdn2{font-size:7px;font-weight:700;opacity:.9}
.hme{background:none!important;border:none!important;cursor:default}.hme:hover{transform:none}
.c0{background:#F0F4F9;color:var(--th)}.c1{background:#C5D9F0;color:#002C77}
.c2{background:#7AACD8;color:#001A52}.c3{background:#3070B0;color:#fff}
.c4{background:#002C77;color:#fff}.clate{background:var(--danger);color:#fff}.cwarn{background:var(--yel);color:var(--yel-d)}
.todayr{position:absolute;inset:0;border-radius:2px;border:2px solid var(--nge-d);pointer-events:none}

/* SHARED SIDEBAR */
.lsb{width:174px;min-width:174px;border-right:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;padding:8px;gap:6px;overflow-y:auto;flex-shrink:0}
.lsb-hdr{display:flex;align-items:center;gap:3px}
.lsb-title{font-size:10px;font-weight:700;color:var(--nge);flex:1}
.lsb-nb{width:16px;height:16px;border-radius:4px;border:0.5px solid var(--border);background:var(--bg);font-size:10px;cursor:pointer;color:var(--tm);display:flex;align-items:center;justify-content:center}
.lsb-nb:hover{background:var(--nge-l);color:var(--nge)}
.lsb-clr{padding:1px 5px;border-radius:var(--r);border:0.5px solid var(--border);background:var(--bg);font-size:9px;cursor:pointer;color:var(--tm)}
.lsb-clr:hover{background:var(--nge-l);color:var(--nge)}
.lsb-leg{display:flex;gap:2px;align-items:center;flex-wrap:wrap;font-size:8px;color:var(--tm);margin-top:2px}
.lsb-lb{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.lsb-div{height:1px;background:var(--border)}
.lsb-sec{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--tm)}
.lsb-sg{display:grid;grid-template-columns:1fr 1fr;gap:3px}
.lsb-stat{background:var(--bg);border-radius:var(--r);padding:5px 6px;text-align:center}
.lsb-sn{font-size:14px;font-weight:700;line-height:1}.lsb-sl{font-size:7px;text-transform:uppercase;letter-spacing:.04em;color:var(--tm);margin-top:1px}
.lsb-row{display:flex;align-items:center;gap:5px;padding:3px 0;font-size:10px;border-bottom:0.5px solid var(--border)}
.lsb-row:last-child{border-bottom:none}
.lsb-rdot{width:6px;height:6px;border-radius:50%;flex-shrink:0}.lsb-rname{flex:1;color:var(--tm);font-size:10px}.lsb-rn{font-weight:700}
.lsb-note{font-size:9px;color:var(--th);font-style:italic;line-height:1.4}
.lsb-hint{font-size:9px;color:var(--th);font-style:italic}

/* ── ITEM POPUP ── */
.item-popup{position:fixed;z-index:9999;background:var(--surface);border:0.5px solid var(--border);border-radius:var(--rl);box-shadow:0 4px 20px rgba(0,0,0,.15);padding:14px;width:280px;display:none}
.item-popup.open{display:block}
.ip-hdr{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding-bottom:8px;border-bottom:0.5px solid var(--border)}
.ip-ref{font-size:13px;font-weight:700;color:var(--nge)}
.ip-stat{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;background:var(--bg)}
.ip-close{margin-left:auto;width:22px;height:22px;border-radius:50%;border:0.5px solid var(--border);background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--tm)}
.ip-close:hover{background:var(--danger-l);color:var(--danger)}
.ip-tit{font-size:12px;font-weight:500;color:var(--text);margin-bottom:10px;line-height:1.3}
.ip-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.ip-lbl{font-size:11px;color:var(--tm);width:56px;flex-shrink:0}
.ip-input{flex:1;padding:4px 8px;border:0.5px solid var(--border);border-radius:var(--r);font-size:11px;background:var(--bg);outline:none;color:var(--text)}
.ip-input:focus{border-color:var(--nge);background:#fff}
.ip-btns{display:flex;gap:6px;margin-top:12px;padding-top:10px;border-top:0.5px solid var(--border)}
.ip-btn{flex:1;padding:6px;border-radius:var(--r);border:0.5px solid var(--border);background:var(--bg);font-size:11px;font-weight:600;cursor:pointer;color:var(--tm)}
.ip-btn:hover{background:var(--nge-l);color:var(--nge);border-color:var(--nge)}
.ip-btn.primary{background:var(--nge);color:#fff;border-color:var(--nge)}
.ip-btn.primary:hover{background:#001e5a}
.ip-btn.link{background:var(--yel-l);color:var(--yel-d);border-color:var(--yel)}
.ip-btn.link:hover{background:var(--yel);color:#fff}

/* T1 KANBAN */
.t1-board{flex:1;display:flex;gap:7px;overflow:hidden;padding:8px}
.t1-col{flex:1;min-width:0;background:var(--surface);border:0.5px solid var(--border);border-radius:var(--rl);overflow:hidden;display:flex;flex-direction:column;transition:.12s}
.t1-col.drag-over{border-color:var(--nge);background:#eef2ff}
.t1-chdr{padding:5px 9px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:5px;flex-shrink:0;background:var(--bg)}
.t1-cdot{width:7px;height:7px;border-radius:50%}
.t1-cname{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;flex:1;color:var(--tm)}
.t1-ccnt{font-size:9px;font-weight:700;background:var(--surface);padding:0 5px;border-radius:20px;border:0.5px solid var(--border);color:var(--tm)}
.t1-ccnt.m{background:var(--yel);color:var(--yel-d);border-color:var(--yel)}
.t1-cbody{flex:1;overflow-y:auto;padding:5px;display:flex;flex-direction:column;gap:3px}
.t1-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--r);padding:5px 8px;border-left:3px solid;cursor:grab;transition:.08s}
.t1-card:hover{background:var(--nge-l)}.t1-card.dragging{opacity:.3;cursor:grabbing}
.t1-card.match{background:var(--yel-l)!important;border-color:var(--yel)!important;order:-1}
.t1-card.dim{opacity:.13;pointer-events:none}
.t1-cref{font-size:9px;font-weight:700;color:var(--nge);margin-bottom:1px}
.t1-ctit{font-size:10px;color:var(--text);line-height:1.2;margin-bottom:3px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.t1-cft{display:flex;gap:2px;flex-wrap:wrap}

/* T2 AGENDA DEMANDES */
.ag-main{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;min-width:0}
.ag-nav{background:var(--nge);padding:0 12px;height:40px;display:flex;align-items:center;gap:8px;flex-shrink:0}
.ag-nbtn{width:22px;height:22px;border-radius:var(--r);border:1px solid rgba(255,255,255,.2);background:transparent;font-size:12px;cursor:pointer;color:rgba(255,255,255,.7);display:flex;align-items:center;justify-content:center}
.ag-nbtn:hover{background:rgba(255,255,255,.12);color:#fff}
.ag-period{font-size:12px;font-weight:600;color:#fff;flex:1;text-align:center}
.ag-tdb{padding:3px 10px;border-radius:var(--r);border:1px solid rgba(255,255,255,.2);background:transparent;font-size:11px;cursor:pointer;color:rgba(255,255,255,.6)}
.ag-tdb:hover{background:rgba(255,255,255,.12);color:#fff}
.ag-grid-wrap{flex:1;overflow-y:auto;overflow-x:auto}
.ag-grid{display:grid;grid-template-columns:92px repeat(7,1fr);position:relative}
.ag-corner{height:32px;position:sticky;top:0;background:var(--surface);z-index:10;border-bottom:1px solid var(--border);border-right:0.5px solid var(--border)}
.ag-dh{height:32px;border-bottom:1px solid var(--border);border-right:0.5px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;position:sticky;top:0;background:var(--surface);z-index:10}
.ag-dh:last-child{border-right:none}.ag-dh.today{background:var(--nge-l)}
.ag-dh-name{font-size:9px;font-weight:600;color:var(--th);text-transform:uppercase;letter-spacing:.04em}
.ag-dh-num{font-size:13px;font-weight:700;color:var(--text);line-height:1}
.ag-dh-num.today{width:24px;height:24px;background:var(--nge);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px}
.ag-label{padding:3px 8px 3px 4px;display:flex;flex-direction:column;justify-content:center;min-height:34px;border-bottom:0.5px solid var(--border);border-right:0.5px solid var(--border)}
.ag-lref{font-size:9px;font-weight:700;color:var(--nge)}.ag-llabo{font-size:8px;color:var(--th)}
.ag-cell{border-bottom:0.5px solid var(--border);border-right:0.5px solid var(--border);min-height:34px;position:relative}
.ag-cell:last-child{border-right:none}.ag-cell.today{background:rgba(0,44,119,.025)}
.ag-bar{position:absolute;top:4px;bottom:4px;border-radius:5px;display:flex;align-items:center;padding:0 7px 0 8px;cursor:pointer;z-index:5;overflow:hidden;white-space:nowrap;gap:5px;transition:box-shadow .1s}
.ag-bar:hover{box-shadow:0 2px 8px rgba(0,0,0,.18);z-index:6}
.ag-bar.is-dragging{opacity:.35;cursor:grabbing;box-shadow:none}
.ag-bar-ref{font-size:10px;font-weight:700;flex-shrink:0;pointer-events:none}
.ag-bar-tit{font-size:10px;overflow:hidden;text-overflow:ellipsis;flex:1;pointer-events:none}
.ag-bar-bds{display:flex;gap:3px;flex-shrink:0;pointer-events:none}
.ag-rh{width:8px;min-width:8px;height:70%;border-radius:3px;background:rgba(255,255,255,.45);cursor:ew-resize;flex-shrink:0}
.ag-rh:hover{background:rgba(255,255,255,.8)}
.ag-bg{border-bottom:0.5px solid var(--border);border-right:0.5px solid var(--border)}
.ag-bg:last-child{border-right:none}.ag-bg.today{background:rgba(0,44,119,.02)}
.ag-bg-lbl{border-bottom:0.5px solid var(--border);border-right:0.5px solid var(--border)}

/* T3 AGENDA LABO */
.al-main{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;min-width:0}
.al-nav{background:var(--nge);padding:0 12px;height:40px;display:flex;align-items:center;gap:8px;flex-shrink:0}
.al-nbtn{width:22px;height:22px;border-radius:var(--r);border:1px solid rgba(255,255,255,.2);background:transparent;font-size:12px;cursor:pointer;color:rgba(255,255,255,.7);display:flex;align-items:center;justify-content:center}
.al-nbtn:hover{background:rgba(255,255,255,.12);color:#fff}
.al-period{font-size:12px;font-weight:600;color:#fff;flex:1;text-align:center}
.al-tdb{padding:3px 10px;border-radius:var(--r);border:1px solid rgba(255,255,255,.2);background:transparent;font-size:11px;cursor:pointer;color:rgba(255,255,255,.6)}
.al-tdb:hover{background:rgba(255,255,255,.12);color:#fff}
.al-views{display:flex;gap:2px;background:rgba(255,255,255,.12);border-radius:var(--r);padding:2px}
.al-vb{padding:3px 10px;border-radius:4px;border:none;background:transparent;font-size:11px;font-weight:600;cursor:pointer;color:rgba(255,255,255,.55)}
.al-vb:hover{color:#fff}.al-vb.on{background:var(--yel);color:var(--yel-d)}
.al-grid-wrap{flex:1;overflow:auto;padding-right:1px}
.al-grid{display:grid;position:relative}
.al-corner{position:sticky;top:0;background:var(--surface);z-index:11;border-bottom:1px solid var(--border);border-right:1px solid var(--border);grid-column:1;grid-row:1;height:34px}
.al-col-hdr{position:sticky;top:0;background:var(--surface);z-index:10;border-bottom:1px solid var(--border);border-right:0.5px solid var(--border);padding:4px;text-align:center;height:34px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.al-col-hdr:last-child{border-right:none}.al-col-hdr.today{background:var(--nge-l)}
.al-ch-name{font-size:9px;font-weight:600;color:var(--th);text-transform:uppercase;letter-spacing:.04em}
.al-ch-num{font-size:14px;font-weight:700;color:var(--text);line-height:1;margin-top:1px}
.al-ch-num.today{width:24px;height:24px;background:var(--nge);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;margin:1px auto 0}
.al-hlabel{font-size:8px;color:var(--th);text-align:right;padding-right:5px;border-right:1px solid var(--border);display:flex;align-items:flex-start;justify-content:flex-end;padding-top:3px}
.al-hcell{border-right:0.5px solid var(--border);border-bottom:0.5px solid var(--border);position:relative;cursor:pointer;transition:.06s}
.al-hcell:last-child{border-right:none}.al-hcell:hover{background:rgba(0,44,119,.04)}
.al-hcell.today{background:rgba(0,44,119,.022)}
.al-half-line{position:absolute;left:0;right:0;top:50%;height:0.5px;background:rgba(0,0,0,.07);pointer-events:none}
.al-evt{position:absolute;left:2px;right:2px;border-radius:5px;padding:3px 6px;font-size:10px;font-weight:600;overflow:hidden;cursor:pointer;z-index:5;transition:box-shadow .1s;min-height:18px}
.al-evt:hover{box-shadow:0 2px 8px rgba(0,0,0,.18);z-index:6}
.al-evt.is-dragging{opacity:.35;cursor:grabbing}
.al-evt-ref{font-size:9px;font-weight:700;margin-bottom:1px}
.al-evt-tit{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.al-evt-time{font-size:8px;opacity:.7;margin-top:1px}
.al-evt-sub{font-size:8px;opacity:.6;margin-top:1px}
.al-resize-b{position:absolute;bottom:0;left:0;right:14px;height:6px;cursor:ns-resize;background:rgba(255,255,255,.3);border-radius:0 0 0 5px}
.al-resize-r{position:absolute;right:0;top:0;bottom:0;width:8px;cursor:ew-resize;background:rgba(255,255,255,.3);border-radius:0 5px 5px 0;z-index:2}
.al-resize-r:hover{background:rgba(255,255,255,.65)}
.al-resize-b:hover{background:rgba(255,255,255,.65)}
.al-nowline{position:absolute;left:0;right:0;z-index:8;pointer-events:none;display:flex;align-items:center}
.al-nowline::before{content:'';width:8px;height:8px;border-radius:50%;background:var(--danger);flex-shrink:0;margin-left:-4px}
.al-nowline::after{content:'';flex:1;height:2px;background:var(--danger)}

/* T4 ANALYSER */
.t4-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;padding:8px;gap:7px}
.t4-tb{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--rl);padding:7px 10px;display:flex;align-items:center;gap:7px;flex-shrink:0}
.t4-zooms{display:flex;gap:2px;background:var(--bg);border:0.5px solid var(--border);border-radius:var(--r);padding:2px}
.t4-zb{padding:3px 9px;border-radius:4px;border:none;background:transparent;font-size:11px;font-weight:500;cursor:pointer;color:var(--tm)}
.t4-zb:hover{color:var(--text)}.t4-zb.on{background:var(--nge);color:#fff}
.t4-nav{display:flex;align-items:center;gap:4px}
.t4-nbtn{width:20px;height:20px;border-radius:var(--r);border:0.5px solid var(--border);background:var(--bg);font-size:11px;cursor:pointer;color:var(--tm);display:flex;align-items:center;justify-content:center}
.t4-nbtn:hover{background:var(--nge-l);color:var(--nge)}
.t4-period{font-size:11px;font-weight:600;color:var(--nge);min-width:120px;text-align:center}
.t4-tdb{padding:3px 8px;border-radius:var(--r);border:0.5px solid var(--border);background:var(--bg);font-size:10px;cursor:pointer;color:var(--tm)}
.t4-tdb:hover{background:var(--nge-l);color:var(--nge)}
.t4-leg{display:flex;gap:3px;align-items:center;font-size:8px;color:var(--tm);margin-left:auto;flex-wrap:wrap}
.t4-lb{width:9px;height:9px;border-radius:2px}
.t4-content{flex:1;background:var(--surface);border:0.5px solid var(--border);border-radius:var(--rl);overflow:auto;padding:10px}
.t4-spark{display:flex;gap:2px;align-items:flex-end;height:22px;margin-top:4px}
.t4-spb{border-radius:2px 2px 0 0;min-width:6px;flex:1}
.t4-spl{display:flex;justify-content:space-between;font-size:7px;color:var(--th);margin-top:1px}
.t4-wg{display:grid;grid-template-columns:72px repeat(7,1fr);gap:2px}
.t4-wgh{font-size:8px;font-weight:600;color:var(--th);text-align:center;padding-bottom:3px}
.t4-wl{font-size:9px;color:var(--tm);text-align:right;padding-right:5px;display:flex;align-items:center;justify-content:flex-end}
.t4-wc{min-height:42px;border-radius:var(--r);padding:3px;display:flex;flex-direction:column;gap:2px;border:1.5px solid transparent;cursor:pointer}
.t4-wc:hover{border-color:var(--nge-m)}.t4-wc.tc{border-color:var(--nge)!important}
.t4-wchip{font-size:8px;font-weight:600;padding:1px 4px;border-radius:2px;background:rgba(255,255,255,.75);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

<script>
// ─────────────────────────────────────────────────────
// DATA
// ─────────────────────────────────────────────────────
// ── DATA — chargé depuis l'API ──────────────────────────────────────────
let ALL = []; // rempli par loadData()
let API_TOKEN = null; // JWT récupéré au démarrage
const QS = new URLSearchParams(window.location.search);
const DEMANDE_CONTEXT_UID = parseInt(QS.get('demande_id') || '0', 10) || 0;
let DEMANDE_CONTEXT = null;
let DEMANDE_NAV = null;
let PLANNING_LOCKED = false;

// Essaie de récupérer le token depuis le cookie ou localStorage
function getToken(){
  // En production: lire depuis localStorage ou cookie httpOnly via /api/me
  try { return localStorage.getItem('ralab_token') || ''; } catch(e){ return ''; }
}

function escHtml(v){return String(v==null?'':v).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;',"'":'&#39;'}[m]));}

async function loadDemandeContext(){
  if(!DEMANDE_CONTEXT_UID) return;
  try{
    const token = getToken();
    const headers = token ? {Authorization:'Bearer '+token} : {};
    const [demRes, navRes] = await Promise.all([
      fetch('/api/demandes_rst/' + DEMANDE_CONTEXT_UID, {headers}),
      fetch('/api/demandes_rst/' + DEMANDE_CONTEXT_UID + '/navigation', {headers}),
    ]);
    DEMANDE_CONTEXT = demRes.ok ? await demRes.json() : null;
    DEMANDE_NAV = navRes.ok ? await navRes.json() : null;
    PLANNING_LOCKED = !!(DEMANDE_CONTEXT_UID && !DEMANDE_NAV?.visibility?.planning);
  }catch(_err){
    DEMANDE_CONTEXT = null;
    DEMANDE_NAV = null;
    PLANNING_LOCKED = false;
  }
  applyPlanningContextBanner();
}

function applyPlanningContextBanner(){
  const banner = document.getElementById('ctx-banner');
  if(!banner) return;
  if(!DEMANDE_CONTEXT_UID){
    banner.classList.remove('show');
    banner.innerHTML='';
    return;
  }
  const ref = DEMANDE_CONTEXT?.reference || ('Demande #' + DEMANDE_CONTEXT_UID);
  const chantier = DEMANDE_CONTEXT?.chantier || DEMANDE_CONTEXT?.client || '—';
  if(PLANNING_LOCKED){
    banner.innerHTML = `<div><strong>Planning non activé pour ${escHtml(ref)}</strong><span>Cette demande n'ouvre pas le bloc planning pour le moment. Le planning général reste disponible ailleurs, mais cette vue ciblée reste verrouillée.</span></div><div class="ctx-actions"><button class="ctx-btn" onclick="window.location.href='demande.html?uid=${DEMANDE_CONTEXT_UID}'">← Retour demande</button></div>`;
  }else{
    banner.innerHTML = `<div><strong>Planning ciblé sur ${escHtml(ref)}</strong><span>${escHtml(chantier)} · cette vue est filtrée sur la demande courante.</span></div><div class="ctx-actions"><button class="ctx-btn" onclick="window.location.href='demande.html?uid=${DEMANDE_CONTEXT_UID}'">← Retour demande</button><button class="ctx-btn" onclick="window.location.href='planning.html'">Planning global</button></div>`;
  }
  banner.classList.add('show');
}

async function loadData(){
  try {
    const token = getToken();
    const headers = token ? {Authorization:'Bearer '+token} : {};
    const res = await fetch('/api/planning/demandes', {headers});
    if(!res.ok) throw new Error('HTTP '+res.status);
    const raw = await res.json();
    let scoped = raw;
    if(DEMANDE_CONTEXT_UID){
      scoped = raw.filter(d => Number(d.uid) === DEMANDE_CONTEXT_UID);
      if(PLANNING_LOCKED){
        scoped = [];
      }
    }
    // Ajouter th/te par défaut (heures pour Agenda Labo — pas en DB)
    ALL = scoped.map((d,i)=>({
      ...d,
      th: d.th || (8 + (d.uid % 3) * 2),
      te: d.te || (d.th ? d.th + 2 : 12),
    }));
    rc();
  } catch(err){
    console.warn('API non disponible, mode démo activé:', err.message);
    // Fallback démo si API inaccessible
    ALL = DEMANDE_CONTEXT_UID ? DEMO_DATA.filter(d => Number(d.uid) === DEMANDE_CONTEXT_UID) : DEMO_DATA;
    if(PLANNING_LOCKED) ALL = [];
    rc();
  }
}

// Sauvegarde une modification de date/statut vers l'API
async function saveToAPI(uid, patch){
  if(PLANNING_LOCKED) return;
  try {
    const token = getToken();
    const headers = {'Content-Type':'application/json'};
    if(token) headers['Authorization'] = 'Bearer '+token;
    await fetch('/api/planning/demandes/'+uid, {
      method:'PATCH', headers, body:JSON.stringify(patch)
    });
  } catch(err){
    console.warn('Erreur sauvegarde API:', err.message);
  }
}

  {bg:'#EAF3DE',border:'#1d9e75',text:'#3b6d11'},

const STATS=[{s:'À qualifier',dot:'#888780'},{s:'Demande',dot:'#4A7DB5'},{s:'En Attente',dot:'#e67e22'},{s:'En Cours',dot:'#1d9e75'},{s:'Répondu',dot:'#534ab7'},{s:'Fini',dot:'#0f6e56'},{s:'Envoyé - Perdu',dot:'#e24b4a'}];

const fd=s=>{if(!s)return'';const p=s.split('-');return`${p[2]}/${p[1]}`};

const isToday=d=>d.getDate()===TODAY.d&&d.getMonth()===TODAY.m&&d.getFullYear()===TODAY.y;

function urgBd(u){return u==='late'?'<span class="bd br">Ret.</span>':u==='soon'?'<span class="bd by">Urg.</span>':'';}

  return ALL.filter(d=>{
    if(laboF&&d.labo!==laboF)return false;
    if(gF==='late')return d.urg==='late';
    if(gF==='soon')return d.urg==='soon'||d.urg==='late';
    if(gF==='dst')return d.dst;
    return true;

}
function setTab(n){curTab=n;[1,2,3,4].forEach(i=>{document.getElementById('t'+i).classList.toggle('on',i===n);document.getElementById('tab'+i).classList.toggle('on',i===n);});closePopup();rc();}

function sl(v){laboF=v;rc();}
function rc(){if(curTab===1)r1();else if(curTab===2)r2();else if(curTab===3)r3();else r4();}

function updUrg(item){
  if(!item.ech){item.urg='done';return;}
  const diff=Math.round((new Date(item.ech)-new Date(2026,2,18))/864e5);
  if(diff<0)item.urg='late';else if(diff<=7)item.urg='soon';else item.urg='ok';
}

// ─────────────────────────────────────────────────────
// POPUP
// ─────────────────────────────────────────────────────
function openPopup(uid,anchorEl,showHours){
  const item=ALL.find(d=>d.uid===uid);
  if(!item)return;
  popupUID=uid;
  popupShowHours=!!showHours;

  const popup=document.getElementById('item-popup');
  document.getElementById('ip-ref').textContent=item.ref;
  document.getElementById('ip-tit').textContent=item.tit;
  const sb=STAT_BG[item.stat]||['#f1efe8','#888'];
  const statEl=document.getElementById('ip-stat');
  statEl.textContent=item.stat;
  statEl.style.background=sb[0];statEl.style.color=sb[1];
  document.getElementById('ip-start').value=item.start||'';
  document.getElementById('ip-ech').value=item.ech||'';
  document.getElementById('ip-hour-row').style.display=showHours?'flex':'none';
  if(showHours){
    document.getElementById('ip-th').value=item.th;
    document.getElementById('ip-te').value=item.te;
  }

  // Position near anchor using fixed coords (body-level)
  popup.classList.add('open');
  document.body.appendChild(popup); // always at body level
  if(anchorEl){
    const ar=anchorEl.getBoundingClientRect();
    const pw=290, ph=260;
    let top=ar.bottom+6;
    let left=ar.left;
    if(left+pw>window.innerWidth-8)left=window.innerWidth-pw-8;
    if(top+ph>window.innerHeight-8)top=Math.max(8,ar.top-ph-6);
    popup.style.top=top+'px';
    popup.style.left=left+'px';
  }
}
function closePopup(){
  document.getElementById('item-popup').classList.remove('open');
  popupUID=null;
  window._laboPopupId=null;
}
function popupChange(){
  // Labo slot case
  if(window._laboPopupId){
    const slot=LABO_DATA.find(s=>s.id===window._laboPopupId);
    if(slot){
      const d=document.getElementById('ip-start').value;
      const de=document.getElementById('ip-ech').value;
      if(d)slot.date=d;
      if(de&&de>=d)slot.dateEnd=de; else slot.dateEnd=d;
      const th=parseInt(document.getElementById('ip-th').value);
      const te=parseInt(document.getElementById('ip-te').value);
      if(!isNaN(th)&&!isNaN(te)&&te>th){slot.th=th;slot.te=te;}
    }
    r3();
    return;
  }
  // Demande case
  if(popupUID===null)return;
  const item=ALL.find(d=>d.uid===popupUID);
  if(!item)return;
  const s=document.getElementById('ip-start').value;
  const e=document.getElementById('ip-ech').value;
  if(s)item.start=s;
  if(e)item.ech=e;
  if(popupShowHours){
    const th=parseInt(document.getElementById('ip-th').value);
    const te=parseInt(document.getElementById('ip-te').value);
    if(!isNaN(th)&&!isNaN(te)&&te>th){item.th=th;item.te=te;}
  }
  updUrg(item);
  saveToAPI(item.uid,{start:item.start,ech:item.ech,stat:item.stat});
  rc();
}
function goToDemande(){
  if(window._laboPopupId){
    alert('Slot laboratoire '+window._laboPopupId+' — pas de demande RST liée directement.');
    return;
  }
  if(popupUID===null)return;
  const item=ALL.find(d=>d.uid===popupUID);
  if(!item) return;
  window.location.href='demande.html?uid='+item.uid;
}

function hCounts(data,y,m){
  const cnt={},urg={};
  data.forEach(d=>{
    if(!d.ech)return;
    const dd=new Date(d.ech);
    if(dd.getFullYear()!==y||dd.getMonth()!==m)return;
    const day=dd.getDate();cnt[day]=(cnt[day]||0)+1;
    if(!urg[day]||urg[day]==='ok')urg[day]=d.urg;
    if(urg[day]==='soon'&&d.urg==='late')urg[day]='late';
  });
  return{cnt,urg};
}
function dCls(n,u){
  if(u==='late')return'clate';if(u==='soon')return'cwarn';
  return['c0','c1','c2','c3','c4'][Math.min(n,4)];
}
function buildHm(data,y,m,sel,fn){
  const{cnt,urg}=hCounts(data,y,m);
  const first=new Date(y,m,1),last=new Date(y,m+1,0).getDate();
  const off=(first.getDay()+6)%7;
  let h=D7.map(d=>`<div class="hmdh">${d}</div>`).join('');
  for(let i=0;i<off;i++)h+=`<div class="hmd hme"></div>`;
  for(let d=1;d<=last;d++){
    const n=cnt[d]||0,u=urg[d];
    const iT=d===TODAY.d&&m===TODAY.m&&y===TODAY.y;
    h+=`<div class="hmd ${dCls(n,u)}${sel===d?' sel':''}" onclick="${fn}(${d})">
      ${iT?'<div class="todayr"></div>':''}
      <div class="hmdn">${d}</div>${n?`<div class="hmdn2">${n}</div>`:''}
    </div>`;
  }
  const rest=(7-(off+last)%7)%7;
  for(let i=0;i<rest;i++)h+=`<div class="hmd hme"></div>`;
  return`<div class="hmg">${h}</div>`;
}
function buildLsb(data,calY,calM,calSel,calFn,prevFn,nextFn,extra=''){
  const late=data.filter(d=>d.urg==='late').length;
  const soon=data.filter(d=>d.urg==='soon').length;
  const ok=data.filter(d=>d.urg==='ok').length;
  return`<div class="lsb">
    <div>
      <div class="lsb-hdr">
        <button class="lsb-nb" onclick="${prevFn}">‹</button>
        <div class="lsb-title">${MS[calM]} ${calY}</div>
        <button class="lsb-nb" onclick="${nextFn}">›</button>
        ${calSel!=null?`<button class="lsb-clr" onclick="${calFn}(0)">✕</button>`:''}
      </div>
      ${buildHm(data,calY,calM,calSel,calFn)}
      <div class="lsb-leg">
        <div class="lsb-lb c0" style="border:0.5px solid var(--border)"></div>0
        <div class="lsb-lb c1"></div>1<div class="lsb-lb c2"></div>2
        <div class="lsb-lb c4"></div>4+
        <div class="lsb-lb clate"></div>Ret.
        <div class="lsb-lb cwarn"></div>Urg.
      </div>
    </div>
    <div class="lsb-div"></div>
    <div class="lsb-sg">
      <div class="lsb-stat"><div class="lsb-sn" style="color:var(--danger)">${late}</div><div class="lsb-sl">Retard</div></div>
      <div class="lsb-stat"><div class="lsb-sn" style="color:var(--yel-d)">${soon}</div><div class="lsb-sl">Urgent</div></div>
      <div class="lsb-stat"><div class="lsb-sn" style="color:var(--ok)">${ok}</div><div class="lsb-sl">En cours</div></div>
      <div class="lsb-stat"><div class="lsb-sn" style="color:var(--nge)">${data.length}</div><div class="lsb-sl">Total</div></div>
    </div>
    <div class="lsb-div"></div>
    <div class="lsb-sec">Par statut</div>
    ${STATS.map(({s,dot})=>`<div class="lsb-row"><div class="lsb-rdot" style="background:${dot}"></div><div class="lsb-rname">${s}</div><div class="lsb-rn">${data.filter(d=>d.stat===s).length}</div></div>`).join('')}
    ${extra}
  </div>`;
}

function r2(){
  const data=getF();

  const wn=Math.ceil((ws-new Date(ws.getFullYear(),0,1))/864e5/7)+1;
  const period=`Sem. ${wn} — ${days[0].getDate()} ${MS[days[0].getMonth()]} – ${days[6].getDate()} ${MS[days[6].getMonth()]} ${days[6].getFullYear()}`;

               background:${col.bg};

               border-left:${isClL?`4px solid ${col.border}`:`1.5px solid ${col.border}`};
               border-radius:${br};color:${col.text}"
        onmousedown="agBarMD(event,${ev.uid},'move')">
        <span class="ag-bar-ref">${ev.ref}</span>
        ${urgIcon?`<span style="font-size:10px;flex-shrink:0">${urgIcon}</span>`:''}
        <span class="ag-bar-tit">${ev.tit}</span>
        <span class="ag-bar-dates" style="font-size:9px;opacity:.75;flex-shrink:0;white-space:nowrap">${fd(ev.start)} → ${fd(ev.ech)}</span>

function r3(){
  const data=getF();
  const nD=alView==='day'?1:7;
  const days=nD===1?[new Date(alDate)]:Array.from({length:7},(_,i)=>addD(wStart(alDate),i));
  const HOURS=Array.from({length:24},(_,i)=>i);
  const LABEL_W=48, HDR_H=34;

  // ── Column headers ──────────────────────────────
  let hdrCols='';
  days.forEach((d,i)=>{
    const iT=isToday(d);
    hdrCols+=`<div class="al-col-hdr${iT?' today':''}" style="flex:1;border-right:${i<nD-1?'0.5px solid var(--border)':'none'}">
      <div class="al-ch-name">${D7[(d.getDay()+6)%7]}</div>
      ${iT?`<div class="al-ch-num today">${d.getDate()}</div>`:`<div class="al-ch-num">${d.getDate()}</div>`}
    </div>`;
  });

  // ── Hour labels ─────────────────────────────────
  let labels='';
  HOURS.forEach(hh=>{
    labels+=`<div style="height:${HPX}px;font-size:8px;color:var(--th);text-align:right;
      padding:3px 5px 0 0;border-bottom:0.5px solid var(--border);flex-shrink:0">
      ${hh===0?'':String(hh).padStart(2,'0')+':00'}
    </div>`;
  });

  // ── Day columns ─────────────────────────────────
  let dayCols='';
  days.forEach((d,ci)=>{
    const ds=dstr(d);
    const iT=isToday(d);

    // bg grid cells
    let bg='';
    HOURS.forEach(hh=>{
      bg+=`<div style="height:${HPX}px;border-bottom:0.5px solid var(--border);
        ${iT?'background:rgba(0,44,119,.02)':''}">
        <div style="height:50%;border-bottom:0.5px dashed rgba(0,0,0,.07)"></div>
      </div>`;
    });

    // events starting on this day
    let evts='';
    LABO_DATA.filter(s=>s.date===ds).forEach(slot=>{
      const top=slot.th*HPX+2;
      const hpx=Math.max(20,(slot.te-slot.th)*HPX-4);
      const pal=LABO_PAL[slot.col%LABO_PAL.length];
      // count how many days this slot spans within visible days
      const spanDays=Math.max(1,Math.round((new Date(slot.dateEnd)-new Date(slot.date))/864e5)+1);
      const visibleSpan=Math.min(spanDays,nD-ci);
      // width covers multiple columns: colW*span - but we're inside a single col div
      // so we use right offset that goes beyond the column boundary
      const widthStyle=visibleSpan>1?`width:calc(${visibleSpan*100}% - 4px)`:'left:2px;right:2px';
      const isMulti=visibleSpan>1;
      evts+=`<div class="al-evt" data-labo-id="${slot.id}"
        style="position:absolute;top:${top}px;height:${hpx}px;
               ${isMulti?widthStyle:'left:2px;right:2px'};
               background:${pal.bg};border:1.5px solid ${pal.border};color:${pal.text};
               ${isMulti?'border-radius:5px 0 0 5px':'border-radius:5px'}"
        onmousedown="alLaboMD(event,'${slot.id}','move')">
        <div class="al-evt-ref" style="color:${pal.border}">${slot.id}</div>
        <div class="al-evt-tit">${slot.label}</div>
        <div class="al-evt-time">${String(slot.th).padStart(2,'0')}:00–${String(slot.te).padStart(2,'0')}:00${spanDays>1?' · '+spanDays+'j':''}</div>

let alLaboDrag=null;
function alLaboMD(e,id,type){
  e.stopPropagation();
  e.preventDefault();
  const slot=LABO_DATA.find(s=>s.id===id);
  if(!slot)return;
  // colW = parent column div width (flexbox col)
  const evtEl=e.target.closest('.al-evt');
  const colDiv=evtEl?evtEl.parentElement:null;
  const colW=colDiv?colDiv.getBoundingClientRect().width:0;
  alLaboDrag={
    id, type:type||'move',
    startX:e.clientX, startY:e.clientY,
    oDate:slot.date, oDateEnd:slot.dateEnd||slot.date,
    oH:slot.th, oE:slot.te,
    committed:false, lastDayOff:0, lastHOff:0,
    colW
  };
}

function openLaboPopup(id,anchorEl){
  const slot=LABO_DATA.find(s=>s.id===id);
  if(!slot)return;
  window._laboPopupId=id;
  popupUID=null;
  const popup=document.getElementById('item-popup');
  document.getElementById('ip-ref').textContent=slot.id;
  document.getElementById('ip-tit').textContent=slot.label;
  const statEl=document.getElementById('ip-stat');
  statEl.textContent=slot.labo;
  statEl.style.background='var(--nge-l)';statEl.style.color='var(--nge)';
  document.getElementById('ip-start').value=slot.date;
  document.getElementById('ip-ech').value=slot.dateEnd||slot.date;
  document.getElementById('ip-hour-row').style.display='flex';
  document.getElementById('ip-th').value=slot.th;
  document.getElementById('ip-te').value=slot.te;
  popup.classList.add('open');
  document.body.appendChild(popup);
  if(anchorEl){
    const ar=anchorEl.getBoundingClientRect();
    const pw=290,ph=280;
    let top=ar.bottom+6,left=ar.left;
    if(left+pw>window.innerWidth-8)left=window.innerWidth-pw-8;
    if(top+ph>window.innerHeight-8)top=Math.max(8,ar.top-ph-6);
    popup.style.top=top+'px';popup.style.left=left+'px';
  }
}

function t4Zs(z){t4Zoom=z;r4();}
function t4Nav(n){
  if(t4Zoom==='week')t4Ref=addD(t4Ref,n*7);
  else if(t4Zoom==='month'){t4Ref.setMonth(t4Ref.getMonth()+n);t4Ref=new Date(t4Ref);}
  else{t4Ref.setFullYear(t4Ref.getFullYear()+n);t4Ref=new Date(t4Ref);}
  r4();
}
function t4Today(){t4Ref=new Date(2026,2,1);r4();}

function r4(){
  const data=getF();
  const y=t4Ref.getFullYear(),m=t4Ref.getMonth();
  let period='',cal='';

  if(t4Zoom==='week'){
    const ws=wStart(t4Ref),days=Array.from({length:7},(_,i)=>addD(ws,i));
    period=`${days[0].getDate()}/${days[0].getMonth()+1} – ${days[6].getDate()}/${days[6].getMonth()+1}/${days[6].getFullYear()}`;
    const labos=['Saint-Priest','Chambéry','Pont-du-Ch.','À définir'];
    const hdr=`<div class="t4-wgh"></div>`+days.map((d,i)=>{
      const iT=isToday(d);
      return`<div class="t4-wgh" style="${iT?'color:var(--nge);font-weight:700':''}">${D7[i]} ${d.getDate()}/${d.getMonth()+1}</div>`;
    }).join('');
    const rows=labos.map(labo=>{
      const ld=data.filter(d=>labo==='À définir'?!d.labo:d.labo===labo);
      return`<div class="t4-wl">${labo}</div>`+days.map(day=>{
        const y2=day.getFullYear(),m2=day.getMonth(),d2=day.getDate();
        const items=ld.filter(x=>x.ech&&new Date(x.ech).getDate()===d2&&new Date(x.ech).getMonth()===m2&&new Date(x.ech).getFullYear()===y2);
        const n=items.length,u=items.find(x=>x.urg==='late')?'late':items.find(x=>x.urg==='soon')?'soon':n?'ok':null;
        const iT=d2===TODAY.d&&m2===TODAY.m&&y2===TODAY.y;
        return`<div class="t4-wc ${dCls(n,u)}${iT?' tc':''}">
          ${items.slice(0,3).map(x=>`<div class="t4-wchip ${x.urg}">${x.ref}</div>`).join('')}
          ${n>3?`<div style="font-size:7px;opacity:.7">+${n-3}</div>`:''}
        </div>`;
      }).join('');
    }).join('');
    cal=`<div class="t4-wg">${hdr}${rows}</div>`;

  } else if(t4Zoom==='month'){
    period=`${MONTHS[m]} ${y}`;
    const{cnt,urg}=hCounts(data,y,m);
    const first=new Date(y,m,1),last=new Date(y,m+1,0).getDate();
    const off=(first.getDay()+6)%7;
    let h=D7.map(d=>`<div class="t4-mgh">${d}</div>`).join('');
    for(let i=0;i<off;i++)h+=`<div class="t4-mc other"></div>`;
    for(let d=1;d<=last;d++){
      const n=cnt[d]||0,u=urg[d];
      const iT=d===TODAY.d&&m===TODAY.m&&y===TODAY.y;
      const items=data.filter(x=>x.ech&&new Date(x.ech).getDate()===d&&new Date(x.ech).getMonth()===m);
      h+=`<div class="t4-mc${iT?' tc':''}"><div class="t4-mcn">${d}</div>
        ${items.slice(0,2).map(x=>`<div class="t4-mevt ${x.urg}">${x.ref}</div>`).join('')}
        ${items.length>2?`<div class="t4-mmore">+${items.length-2}</div>`:''}
      </div>`;
    }
    const rest=(7-(off+last)%7)%7;
    for(let i=0;i<rest;i++)h+=`<div class="t4-mc other"></div>`;
    cal=`<div class="t4-mg">${h}</div>`;

  } else {
    period=`Année ${y}`;
    cal=`<div class="t4-yg">${Array.from({length:12},(_,mi)=>{
      const{cnt:c,urg:u}=hCounts(data,y,mi);
      const first=new Date(y,mi,1),last=new Date(y,mi+1,0).getDate();
      const off=(first.getDay()+6)%7;
      let cells=D7.map(d=>`<div class="t4-ydh">${d[0]}</div>`).join('');
      for(let i=0;i<off;i++)cells+=`<div class="t4-yd t4-ye"></div>`;
      for(let d=1;d<=last;d++){
        const n=c[d]||0,ur=u[d];
        const iT=d===TODAY.d&&mi===TODAY.m&&y===TODAY.y;
        cells+=`<div class="t4-yd ${dCls(n,ur)}" style="${iT?'outline:2px solid var(--nge-d)':''}" title="${d}/${mi+1}: ${n}"></div>`;
      }
      const r2=(7-(off+last)%7)%7;
      for(let i=0;i<r2;i++)cells+=`<div class="t4-yd t4-ye"></div>`;
      return`<div class="t4-ym"><div class="t4-ymt">${MS[mi]}</div><div class="t4-ycg">${cells}</div></div>`;
    }).join('')}</div>`;
  }

  const lat=data.filter(d=>d.urg==='late').length;
  const son=data.filter(d=>d.urg==='soon').length;
  const ok=data.filter(d=>d.urg==='ok').length;
  const tot=data.length||1;
  const spM=Array.from({length:6},(_,i)=>{
    const mm=new Date(2026,2-i,1);
    const n=data.filter(x=>x.ech&&new Date(x.ech).getMonth()===mm.getMonth()&&new Date(x.ech).getFullYear()===mm.getFullYear()).length;
    return{l:MS[mm.getMonth()],n};
  }).reverse();
  const spMx=Math.max(...spM.map(x=>x.n),1);

  const lsb=buildLsb(data,t4Ref.getFullYear(),t4Ref.getMonth(),null,'()=>{}','r4()','r4()',`
    <div class="lsb-div"></div>
    <div class="lsb-sg">
      <div class="lsb-stat"><div class="lsb-sn" style="color:var(--danger)">${lat}</div><div class="lsb-sl">Retard</div></div>
      <div class="lsb-stat"><div class="lsb-sn" style="color:var(--yel-d)">${son}</div><div class="lsb-sl">Urgent</div></div>
    </div>
    <div style="height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin:2px 0 4px"><div style="height:100%;width:${Math.round(lat/tot*100)}%;background:var(--danger);border-radius:2px"></div></div>
    <div class="lsb-div"></div>
    <div class="lsb-sec">Charge 6 mois</div>
    <div class="t4-spark">${spM.map(x=>`<div class="t4-spb" style="height:${Math.max(3,Math.round(x.n/spMx*20))}px;background:var(--nge-m)"></div>`).join('')}</div>
    <div class="t4-spl">${spM.map(x=>`<span>${x.l}</span>`).join('')}</div>
  `);

  document.getElementById('t4').innerHTML=lsb+`
    <div class="t4-wrap">
      <div class="t4-tb">
        <div class="t4-zooms">
          <button class="t4-zb${t4Zoom==='week'?' on':''}" onclick="t4Zs('week')">Semaine</button>
          <button class="t4-zb${t4Zoom==='month'?' on':''}" onclick="t4Zs('month')">Mois</button>
          <button class="t4-zb${t4Zoom==='year'?' on':''}" onclick="t4Zs('year')">Année</button>
        </div>
        <div class="t4-nav">
          <button class="t4-nbtn" onclick="t4Nav(-1)">‹</button>
          <div class="t4-period">${period}</div>
          <button class="t4-nbtn" onclick="t4Nav(1)">›</button>
        </div>
        <button class="t4-tdb" onclick="t4Today()">Aujourd'hui</button>
        <div style="flex:1"></div>
        <div class="t4-leg">
          <div class="t4-lb c0" style="border:0.5px solid var(--border)"></div>0
          <div class="t4-lb c1"></div>1<div class="t4-lb c2"></div>2
          <div class="t4-lb c3"></div>3<div class="t4-lb c4"></div>4+
          <div class="t4-lb clate"></div>Ret.
          <div class="t4-lb cwarn"></div>Urg.
        </div>
      </div>
      <div class="t4-content">${cal}</div>
    </div>`;
}

document.addEventListener('mousemove',function(e){
  // ── Agenda Demandes drag (horizontal) ──
  if(agDragState){
    const dx=e.clientX-agDragState.startX;
    if(!agDragState.committed&&Math.abs(dx)<DRAG_THRESHOLD)return;
    agDragState.committed=true;
    if(!agDragState.cw){
      const grid=document.getElementById('ag-grid');
      if(!grid)return;
      agDragState.cw=(grid.getBoundingClientRect().width-92)/7;
      if(agDragState.cw<=0)return;
    }
    const off=Math.round(dx/agDragState.cw);
    if(off===agDragState.lastOff)return;
    agDragState.lastOff=off;
    const item=ALL.find(d=>d.uid===agDragState.uid);if(!item)return;
    if(agDragState.type==='move'){
      item.start=dstr(addD(new Date(agDragState.oS),off));
      item.ech  =dstr(addD(new Date(agDragState.oE),off));
    } else {
      const ne=addD(new Date(agDragState.oE),off);
      if(ne>=new Date(item.start))item.ech=dstr(ne);
    }
    updUrg(item);
    document.querySelectorAll('[data-ag-uid]').forEach(el=>el.classList.add('is-dragging'));
    r2();
    // Edge scroll detection
    const grid=document.getElementById('ag-grid');
    if(grid){
      const gr=grid.getBoundingClientRect();
      const nearLeft=e.clientX<gr.left+AG_EDGE_ZONE;
      const nearRight=e.clientX>gr.right-AG_EDGE_ZONE;
      if((nearLeft||nearRight)&&!agEdgeTimer){
        agEdgeTimer=setTimeout(()=>{
          agEdgeTimer=null;
          if(!agDragState)return;
          // Advance week and update drag origin to keep relative offset
          if(nearLeft){
            agDate=addD(agDate,-7);
            agDragState.startX+=agDragState.cw*7;
          } else {
            agDate=addD(agDate,7);
            agDragState.startX-=agDragState.cw*7;
          }
          agCalM=agDate.getMonth();agCalY=agDate.getFullYear();
          r2();
        },AG_EDGE_DELAY);
      } else if(!nearLeft&&!nearRight&&agEdgeTimer){
        clearTimeout(agEdgeTimer);agEdgeTimer=null;
      }
    }
    return;
  }
  // ── Agenda Labo demandes drag (vertical) ──
  if(alDragState){
    const dy=e.clientY-alDragState.startY;
    if(!alDragState.committed&&Math.abs(dy)<DRAG_THRESHOLD)return;
    alDragState.committed=true;
    const off=Math.round(dy/HPX);
    if(off===alDragState.lastOff)return;
    alDragState.lastOff=off;
    const item=ALL.find(d=>d.uid===alDragState.uid);if(!item)return;
    if(alDragState.type==='move'){
      const ns=Math.max(0,Math.min(22,alDragState.oH+off));
      item.th=ns;item.te=Math.min(24,ns+(alDragState.oE-alDragState.oH));
    } else {
      item.te=Math.max(item.th+1,Math.min(24,alDragState.oE+off));
    }
    document.querySelectorAll('[data-al-uid]').forEach(el=>el.classList.add('is-dragging'));
    r3();
    return;
  }
  // ── Agenda Labo slots drag (horizontal=day + vertical=hour) ──
  if(alLaboDrag){
    const dx=e.clientX-alLaboDrag.startX;
    const dy=e.clientY-alLaboDrag.startY;
    if(!alLaboDrag.committed&&Math.abs(dx)<DRAG_THRESHOLD&&Math.abs(dy)<DRAG_THRESHOLD)return;
    alLaboDrag.committed=true;
    // colW measured at mousedown; fallback if zero
    if(!alLaboDrag.colW)alLaboDrag.colW=120;
    const slot=LABO_DATA.find(s=>s.id===alLaboDrag.id);if(!slot)return;
    let changed=false;
    if(alLaboDrag.type==='move'){
      // Horizontal → move start+end date
      const dayOff=Math.round(dx/alLaboDrag.colW);
      if(dayOff!==alLaboDrag.lastDayOff){
        alLaboDrag.lastDayOff=dayOff;
        slot.date   =dstr(addD(new Date(alLaboDrag.oDate),dayOff));
        slot.dateEnd=dstr(addD(new Date(alLaboDrag.oDateEnd),dayOff));
        changed=true;
      }
      // Vertical → move start hour (keep duration)
      const hOff=Math.round(dy/HPX);
      if(hOff!==alLaboDrag.lastHOff){
        alLaboDrag.lastHOff=hOff;
        const ns=Math.max(0,Math.min(22,alLaboDrag.oH+hOff));
        slot.th=ns;slot.te=Math.min(24,ns+(alLaboDrag.oE-alLaboDrag.oH));
        changed=true;
      }
    } else if(alLaboDrag.type==='resize-h'){
      // Resize bottom handle → extend end hour
      const hOff=Math.round(dy/HPX);
      if(hOff!==alLaboDrag.lastHOff){
        alLaboDrag.lastHOff=hOff;
        slot.te=Math.max(slot.th+1,Math.min(24,alLaboDrag.oE+hOff));
        changed=true;
      }
    } else if(alLaboDrag.type==='resize-d'){
      // Resize right handle → extend end date
      const dayOff=Math.round(dx/alLaboDrag.colW);
      if(dayOff!==alLaboDrag.lastDayOff){
        alLaboDrag.lastDayOff=dayOff;
        const newEnd=addD(new Date(alLaboDrag.oDateEnd),dayOff);
        if(newEnd>=new Date(slot.date)){
          slot.dateEnd=dstr(newEnd);
          changed=true;
        }
      }
    }
    if(changed){
      document.querySelectorAll('[data-labo-id]').forEach(el=>el.classList.add('is-dragging'));
      r3();
    }
    return;
  }
});
document.addEventListener('mouseup',function(e){
  // ── Agenda Demandes ──
  if(agDragState){
    const wasDrag=agDragState.committed;
    const uid=agDragState.uid;
    agDragState=null;
    if(agEdgeTimer){clearTimeout(agEdgeTimer);agEdgeTimer=null;}
    document.querySelectorAll('[data-ag-uid]').forEach(el=>el.classList.remove('is-dragging'));
    if(wasDrag){
      const it=ALL.find(d=>d.uid===uid);
      if(it)saveToAPI(uid,{start:it.start,ech:it.ech});
    }
    if(!wasDrag){
      const bar=e.target.closest('.ag-bar');
      if(bar)openPopup(uid,bar,false);
    }
    return;
  }
  // ── Agenda Labo demandes ──
  if(alDragState){
    const wasDrag=alDragState.committed;
    const uid=alDragState.uid;
    alDragState=null;
    document.querySelectorAll('[data-al-uid]').forEach(el=>el.classList.remove('is-dragging'));
    if(!wasDrag){
      const evt=e.target.closest('.al-evt');
      if(evt)openPopup(uid,evt,true);
    }
    return;
  }
  // ── Agenda Labo slots ──
  if(alLaboDrag){
    const wasDrag=alLaboDrag.committed;
    const id=alLaboDrag.id;
    alLaboDrag=null;
    document.querySelectorAll('[data-labo-id]').forEach(el=>el.classList.remove('is-dragging'));
    if(!wasDrag){
      const el=e.target.closest('.al-evt');
      if(el)openLaboPopup(id,el);
    }
    return;
  }
  // Close popup if click outside
  const popup=document.getElementById('item-popup');
  if(popup.classList.contains('open')&&!popup.contains(e.target)){
    const isInteractive=e.target.closest('.ag-bar,.al-evt,.t1-card');
    if(!isInteractive)closePopup();
  }
});
// ── Show full range of a demande (navigate to its start week) ─────────────
function agShowFull(uid){
  const item=ALL.find(d=>d.uid===uid);
  if(!item||!item.start)return;
  // Navigate to the week containing the start date
  agDate=new Date(item.start);
  agCalM=agDate.getMonth();agCalY=agDate.getFullYear();agSel=null;
  setTab(2); // ensure on agenda tab
  r2();
  // After render, scroll to show the bar
  setTimeout(()=>{
    const bar=document.querySelector(`[data-ag-uid="${uid}"]`);
    if(bar)bar.scrollIntoView({behavior:'smooth',block:'nearest',inline:'nearest'});
  },80);
}
