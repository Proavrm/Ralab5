<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RaLab4 — Connexion</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --accent: #5b6af0; --accent-h: #4a58d4;
      --bg: #f4f4f0; --surface: #ffffff;
      --border: #e2e2dc; --text: #1a1a2e; --text-m: #6b6b80;
      --success: #1d9e75; --danger: #e24b4a;
      --radius: 10px;
    }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex;
      align-items: center; justify-content: center;
    }
    .login-wrap {
      width: 420px; display: flex; flex-direction: column; gap: 20px;
    }
    .brand { text-align: center; padding-bottom: 8px; }
    .brand h1 { font-size: 32px; font-weight: 700; letter-spacing: -1px; }
    .brand h1 span { color: var(--accent); }
    .brand p { font-size: 14px; color: var(--text-m); margin-top: 4px; }

    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,.06);
    }

    /* Auto-login card */
    .auto-card { padding: 28px; display: flex; flex-direction: column; gap: 16px; }
    .auto-header { display: flex; align-items: center; gap: 14px; }
    .avatar {
      width: 52px; height: 52px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; color: #fff; font-weight: 600; flex-shrink: 0;
    }
    .auto-info h2 { font-size: 17px; font-weight: 600; }
    .auto-info p { font-size: 13px; color: var(--text-m); margin-top: 2px; }
    .role-badge {
      display: inline-block; padding: 2px 10px;
      border-radius: 20px; font-size: 11px; font-weight: 500;
      background: #eeedfe; color: #534ab7; margin-top: 4px;
    }
    .windows-hint {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 14px; background: var(--bg);
      border-radius: var(--radius); font-size: 12px; color: var(--text-m);
    }
    .windows-hint .win-icon { font-size: 16px; }

    .btn-login {
      width: 100%; padding: 14px;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius);
      font-size: 15px; font-weight: 600; cursor: pointer;
      transition: background .15s;
    }
    .btn-login:hover { background: var(--accent-h); }
    .btn-login:disabled { background: #b0b0c0; cursor: not-allowed; }

    /* Divider */
    .divider {
      display: flex; align-items: center; gap: 12px;
      font-size: 12px; color: var(--text-m); padding: 0 28px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    /* Manual login */
    .manual-card { padding: 24px; display: flex; flex-direction: column; gap: 14px; }
    .manual-card h3 { font-size: 14px; font-weight: 500; color: var(--text-m); }
    .user-list { display: flex; flex-direction: column; gap: 6px; max-height: 200px; overflow-y: auto; }
    .user-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 12px; border: 1px solid var(--border);
      border-radius: var(--radius); cursor: pointer;
      transition: background .1s, border-color .1s;
    }
    .user-item:hover { background: var(--bg); border-color: var(--accent); }
    .user-item.selected { background: #eeeffe; border-color: var(--accent); }
    .user-avatar-sm {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--bg); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 600; color: var(--accent);
      flex-shrink: 0;
    }
    .user-name { font-size: 13px; font-weight: 500; flex: 1; }
    .user-role { font-size: 11px; color: var(--text-m); }

    .btn-manual {
      width: 100%; padding: 11px;
      background: var(--surface); color: var(--accent);
      border: 1.5px solid var(--accent); border-radius: var(--radius);
      font-size: 14px; font-weight: 500; cursor: pointer;
      transition: background .15s;
    }
    .btn-manual:hover { background: #eeeffe; }
    .btn-manual:disabled { border-color: var(--border); color: var(--text-m); cursor: not-allowed; }

    /* Status / error */
    .status-msg {
      padding: 10px 14px; border-radius: var(--radius);
      font-size: 13px; text-align: center;
    }
    .status-msg.error   { background: #fcebeb; color: var(--danger); }
    .status-msg.success { background: #eaf3de; color: #3b6d11; }
    .status-msg.hidden  { display: none; }

    /* Loading spinner */
    .spinner {
      width: 18px; height: 18px; border: 2px solid rgba(255,255,255,.4);
      border-top-color: #fff; border-radius: 50%;
      animation: spin .7s linear infinite; display: inline-block;
      vertical-align: middle; margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .footer-note {
      text-align: center; font-size: 12px; color: var(--text-m);
    }
  </style>
</head>
<body>
<div class="login-wrap">

  <!-- Brand -->
  <div class="brand">
    <h1>Ra<span>Lab</span>3</h1>
    <p>Système de gestion laboratoire géotechnique</p>
  </div>

  <!-- Auto-login card (preenchido por JS) -->
  <div class="card" id="auto-card" style="display:none">
    <div class="auto-card">
      <div class="auto-header">
        <div class="avatar" id="auto-avatar">?</div>
        <div class="auto-info">
          <h2 id="auto-name">—</h2>
          <p id="auto-email">—</p>
          <span class="role-badge" id="auto-role">—</span>
        </div>
      </div>
      <div class="windows-hint">
        <span class="win-icon">🪟</span>
        <span>Compte Windows détecté : <strong id="auto-windows">—</strong></span>
      </div>
      <button class="btn-login" id="auto-btn" onclick="autoLogin()">
        Entrer en tant que <span id="auto-btn-name">—</span>
      </button>
    </div>
  </div>

  <!-- Divider (só aparece se auto-login disponível) -->
  <div class="divider" id="divider" style="display:none">ou choisir un autre compte</div>

  <!-- Lista manual -->
  <div class="card">
    <div class="manual-card">
      <h3 id="manual-title">Chargement des comptes...</h3>
      <div class="user-list" id="user-list"></div>
      <button class="btn-manual" id="manual-btn" onclick="manualLogin()" disabled>
        Continuer
      </button>
    </div>
  </div>

  <!-- Mensagem de estado -->
  <div class="status-msg hidden" id="status-msg"></div>

  <div class="footer-note">RaLab4 v0.1 · Réseau interne NGE</div>

</div>

<script>
  const API = 'http://127.0.0.1:8000';
  let selectedEmail = null;
  let autoEmail     = null;

  async function init() {
    await Promise.all([loadHint(), loadUsers()]);
  }

  // ── Auto-detecção Windows ──────────────────────────────────────────────────
  async function loadHint() {
    try {
      const r = await fetch(`${API}/api/auth/hint`);
      const d = await r.json();

      document.getElementById('auto-windows').textContent = d.windows_username || '—';

      if (d.can_auto_login) {
        autoEmail = d.matched_email;
        const initials = d.matched_name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();

        document.getElementById('auto-avatar').textContent  = initials;
        document.getElementById('auto-name').textContent    = d.matched_name;
        document.getElementById('auto-email').textContent   = d.matched_email;
        document.getElementById('auto-btn-name').textContent = d.matched_name.split(' ')[0];
        document.getElementById('auto-card').style.display  = 'block';
        document.getElementById('divider').style.display    = 'flex';

        // carregar role para badge
        const users = await fetch(`${API}/api/auth/users`).then(r => r.json());
        const u = users.find(x => x.email === d.matched_email);
        if (u) document.getElementById('auto-role').textContent = roleLabel(u.role_code);
      }
    } catch { /* API offline */ }
  }

  // ── Lista de utilizadores ──────────────────────────────────────────────────
  async function loadUsers() {
    try {
      const r = await fetch(`${API}/api/auth/users`);
      const users = await r.json();

      const list = document.getElementById('user-list');
      document.getElementById('manual-title').textContent =
        users.length ? 'Ou choisir un compte :' : 'Aucun compte actif trouvé.';

      list.innerHTML = users.map(u => `
        <div class="user-item" onclick="selectUser('${u.email}', this)">
          <div class="user-avatar-sm">${initials(u.display_name)}</div>
          <div style="flex:1">
            <div class="user-name">${u.display_name}</div>
            <div class="user-role">${roleLabel(u.role_code)} · ${u.service_code}</div>
          </div>
        </div>
      `).join('');
    } catch {
      document.getElementById('manual-title').textContent = 'Erreur de connexion à l\'API.';
    }
  }

  function selectUser(email, el) {
    selectedEmail = email;
    document.querySelectorAll('.user-item').forEach(x => x.classList.remove('selected'));
    el.classList.add('selected');
    document.getElementById('manual-btn').disabled = false;
  }

  // ── Login ──────────────────────────────────────────────────────────────────
  async function autoLogin() {
    if (!autoEmail) return;
    await doLogin(autoEmail, 'auto-btn');
  }

  async function manualLogin() {
    if (!selectedEmail) return;
    await doLogin(selectedEmail, 'manual-btn');
  }

  async function doLogin(identifier, btnId) {
    const btn = document.getElementById(btnId);
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Connexion...';

    try {
      const r = await fetch(`${API}/api/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ identifier }),
      });

      if (!r.ok) {
        const err = await r.json();
        showStatus(err.detail || 'Erreur de connexion.', 'error');
        btn.disabled = false;
        btn.innerHTML = 'Réessayer';
        return;
      }

      const data = await r.json();

      // Guardar token e perfil no localStorage
      localStorage.setItem('ralab_token', data.token);
      localStorage.setItem('ralab_user', JSON.stringify(data.user));

      showStatus(`Bienvenue, ${data.user.display_name} !`, 'success');

      // Redirigir para o dashboard
      setTimeout(() => { window.location.href = 'index.html'; }, 600);

    } catch {
      showStatus('Impossible de joindre l\'API. Le serveur est-il démarré ?', 'error');
      btn.disabled = false;
      btn.innerHTML = 'Réessayer';
    }
  }

  // ── Helpers ────────────────────────────────────────────────────────────────
  function initials(name) {
    return name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
  }

  function roleLabel(code) {
    return { admin: 'Administrateur', labo: 'Laboratoire', etudes: 'Études', consult: 'Consultation' }[code] || code;
  }

  function showStatus(msg, type) {
    const el = document.getElementById('status-msg');
    el.textContent = msg;
    el.className = `status-msg ${type}`;
  }

  // Se já tem token válido, redirigir directamente
  const existingToken = localStorage.getItem('ralab_token');
  if (existingToken) {
    fetch(`${API}/api/auth/me`, {
      headers: { 'Authorization': `Bearer ${existingToken}` }
    }).then(r => {
      if (r.ok) window.location.href = 'index.html';
      else { localStorage.removeItem('ralab_token'); localStorage.removeItem('ralab_user'); }
    }).catch(() => {});
  }

  init();
</script>
</body>
</html>
